/* ── Google Sheets API via Apps Script ── */
async function gsRead(url){
  const res=await fetch(`${url}?t=${Date.now()}`);
  return res.json();
}

async function gsWrite(url,sheet,values){
  // mode no-cors: browser can't read response but the write happens on server
  await fetch(url,{
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({sheet,values})
  });
}

/* ── Data conversion ── */
function libroToRow(l){
  return[l.id,l.titulo||"",l.autor||"",l.isbn||"",l.pN??"",l.pU??"",l.ano??"",l.si??0,l.me??0,l.cat||"",
    l.bodegas?.["BES/-2"]??0,l.bodegas?.["BES/5"]??0,l.bodegas?.["BES/8"]??0,
    l.bodegas?.["El Cóndor 5"]??0,l.bodegas?.["ST 207/12"]??0,l.bodegas?.["ST 207/13"]??0];
}
function rowsToObjects(rows){
  if(!rows||rows.length<2)return[];
  const hdrs=rows[0];
  const NUM=["pN","pU","ano","si","me","cantEnv","cantVend","cantDev","cantidad","b_bes2","b_bes5","b_bes8","b_condor5","b_st20712","b_st20713"];
  return rows.slice(1).filter(r=>r.some(v=>v!==null&&v!=="")).map(row=>{
    const obj={};
    hdrs.forEach((h,i)=>{const v=row[i];obj[h]=(v===null||v==="")?(["pN","pU","ano"].includes(h)?null:v):v;});
    NUM.forEach(k=>{if(obj[k]!=null&&obj[k]!=="")obj[k]=Number(obj[k])||0;});
    obj.bodegas={"BES/-2":obj.b_bes2||0,"BES/5":obj.b_bes5||0,"BES/8":obj.b_bes8||0,"El Cóndor 5":obj.b_condor5||0,"ST 207/12":obj.b_st20712||0,"ST 207/13":obj.b_st20713||0};
    return obj;
  });
}

/* ── Stock ── */
function calcStock(libroId,regalos,consignaciones,libros,ventas=[]){
  const l=libros.find(x=>x.id===libroId);if(!l)return{disp:0,enConsig:0,regalados:0,malEstado:0,vendidos:0};
  const regalados=regalos.filter(r=>r.libroId===libroId).reduce((s,r)=>s+r.cantidad,0);
  const enConsig=consignaciones.filter(c=>c.libroId===libroId).reduce((s,c)=>s+c.cantEnv-(c.cantVend||0)-(c.cantDev||0),0);
  const vendidos=(ventas||[]).filter(v=>v.libroId===libroId).reduce((s,v)=>s+(v.cantidad||0),0);
  return{disp:l.si-l.me-regalados-enConsig-vendidos,enConsig,regalados,malEstado:l.me,vendidos};
}

/* ── SETUP SCREEN ── */
const GS_CODE=`function doGet(e) {
  try {
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const out = {};
    ['Libros','Regalos','Consignaciones'].forEach(n => {
      const sh = ss.getSheetByName(n);
      out[n] = (sh && sh.getLastRow()>0) ? sh.getDataRange().getValues() : [];
    });
    return ContentService
      .createTextOutput(JSON.stringify(out))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService
      .createTextOutput(JSON.stringify({error:err.toString()}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

function doPost(e) {
  try {
    const {sheet, values} = JSON.parse(e.postData.contents);
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    let sh = ss.getSheetByName(sheet);
    if (!sh) sh = ss.insertSheet(sheet);
    sh.clearContents();
    if (values && values.length > 0)
      sh.getRange(1,1,values.length,values[0].length).setValues(values);
    return ContentService
      .createTextOutput(JSON.stringify({ok:true}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService
      .createTextOutput(JSON.stringify({error:err.toString()}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`;

function libroToForm(l){return{titulo:l.titulo||"",autor:l.autor||"",isbn:l.isbn||"",pN:l.pN??"",pU:l.pU??"",ano:l.ano??"",si:l.si??"",me:l.me??"0",cat:CATS.includes(l.cat)?l.cat:"__otra__",catCustom:CATS.includes(l.cat)?"":l.cat};}
function formToLibro(f,id,bodegas){const cat=f.cat==="__otra__"?(f.catCustom.trim()||"Sin categoría"):f.cat;return{id,titulo:f.titulo.trim(),autor:f.autor.trim(),isbn:f.isbn.trim()||null,pN:toNum(f.pN),pU:toNum(f.pU),ano:toNum(f.ano),si:parseInt(f.si)||0,me:parseInt(f.me)||0,cat,bodegas:bodegas||BLANK_BOD()};}

function BookForm({initial=BLANK,initBod,bodegaNames,onSave,onCancel,isEdit=false}){
  const[f,setF]=useState(initial);
  const[bod,setBod]=useState(initBod||BLANK_BOD());
  const[err,setErr]=useState("");
  const set=k=>v=>setF(p=>({...p,[k]:v}));
  function submit(){if(!f.titulo.trim()){setErr("El título es obligatorio.");return;}if(f.si===""||isNaN(parseInt(f.si))){setErr("El stock inicial es obligatorio.");return;}if(f.cat==="__otra__"&&!f.catCustom.trim()){setErr("Escribe la categoría.");return;}setErr("");onSave(f,bod);}
  return<div style={{background:"#F8F9FF",border:"1px solid #C7D2FE",borderRadius:8,padding:18}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
      <div style={{gridColumn:"1/-1"}}><LBL ch="Título *"/><Inp value={f.titulo} onChange={set("titulo")} placeholder="Título completo" style={{width:"100%"}}/></div>
      <div style={{gridColumn:"1/-1"}}><LBL ch="Autor(es)"/><Inp value={f.autor} onChange={set("autor")} placeholder="Nombre del autor o autores" style={{width:"100%"}}/></div>
      <div><LBL ch="ISBN"/><Inp value={f.isbn} onChange={set("isbn")} placeholder="Ej: 9789566115786" style={{width:"100%"}}/></div>
      <div><LBL ch="Año"/><Inp type="number" value={f.ano} onChange={set("ano")} placeholder="Ej: 2024" style={{width:"100%"}}/></div>
      <div><LBL ch="Precio Normal ($)"/><Inp type="number" value={f.pN} onChange={set("pN")} min="0" style={{width:"100%"}}/></div>
      <div><LBL ch="Precio USS ($)"/><Inp type="number" value={f.pU} onChange={set("pU")} min="0" style={{width:"100%"}}/></div>
      <div><LBL ch="Stock inicial *"/><Inp type="number" value={f.si} onChange={set("si")} min="0" style={{width:"100%"}}/>{isEdit&&<div style={{fontSize:11,color:OR,marginTop:2}}>⚠ Modifica el disponible.</div>}</div>
      <div><LBL ch="Mal estado"/><Inp type="number" value={f.me} onChange={set("me")} min="0" style={{width:"100%"}}/></div>
      <div style={{gridColumn:"1/-1"}}>
        <LBL ch="Categoría"/>
        <div style={{display:"flex",gap:8}}>
          <Sel value={f.cat} onChange={set("cat")} options={[...CATS.map(c=>({v:c,l:c})),{v:"__otra__",l:"Otra categoría…"}]} style={{flex:1}}/>
          {f.cat==="__otra__"&&<Inp value={f.catCustom} onChange={set("catCustom")} placeholder="Nueva categoría" style={{flex:1}}/>}
        </div>
      </div>
      <div style={{gridColumn:"1/-1"}}><LBL ch="Stock por bodega"/><BodegasSection bodegas={bod} onChange={setBod} bodegaNames={bodegaNames}/></div>
    </div>
    {err&&<div style={{color:RD,fontSize:12,marginBottom:10}}>{err}</div>}
    <div style={{display:"flex",gap:10}}>
      <Btn v="green" onClick={submit}>{isEdit?"✓ Guardar cambios":"+ Agregar libro"}</Btn>
      <Btn v="ghost" onClick={onCancel}>Cancelar</Btn>
    </div>
  </div>;
}

/* ── BOOK DETAIL PANEL ── */
function BookDetailPanel({libro,regalos,consignaciones,libros,bodegaNames,onSaveRegalos,onSaveConsignaciones,onSaveLibros,onClose}){
  const ref=useRef(null);
  const[toast,setToast]=useState("");
  const[editingInfo,setEditingInfo]=useState(false);
  useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth",block:"nearest"});},[]);
  const s=calcStock(libro.id,regalos,consignaciones,libros);
  const dispColor=s.disp<=0?RD:s.disp<20?"#D97706":GR;
  function handleSaveInfo(f,bod){onSaveLibros(libros.map(l=>l.id===libro.id?formToLibro(f,libro.id,bod):l));setEditingInfo(false);setToast("Información actualizada.");}
  function handleDelete(){const hasM=regalos.some(r=>r.libroId===libro.id)||consignaciones.some(c=>c.libroId===libro.id);if(window.confirm(hasM?"Este libro tiene movimientos. ¿Confirmas eliminar?":"¿Eliminar libro del catálogo?")){onSaveLibros(libros.filter(l=>l.id!==libro.id));onClose();}}

  const[showCF,setShowCF]=useState(false);
  const[cf,setCf]=useState({distribuidor:"",cantEnv:"",fechaEnv:new Date().toISOString().slice(0,10),notas:""});
  const[cErr,setCErr]=useState("");
  const[editCId,setEditCId]=useState(null);
  const[ecf,setEcf]=useState({});
  const misCons=consignaciones.filter(c=>c.libroId===libro.id).sort((a,b)=>b.fechaEnv.localeCompare(a.fechaEnv));
  function subCons(){if(!cf.distribuidor.trim()||!cf.cantEnv||!cf.fechaEnv){setCErr("Completa todos los campos.");return;}const c=parseInt(cf.cantEnv);if(!c||c<=0){setCErr("Cantidad inválida.");return;}const fr=calcStock(libro.id,regalos,consignaciones,libros);if(c>fr.disp){setCErr(`Disponible: ${fr.disp} ej.`);return;}onSaveConsignaciones([...consignaciones,{id:uid(),libroId:libro.id,distribuidor:cf.distribuidor.trim(),cantEnv:c,cantVend:0,cantDev:0,fechaEnv:cf.fechaEnv,notas:cf.notas,estado:"activa"}]);setToast("Consignación registrada.");setCf({distribuidor:"",cantEnv:"",fechaEnv:new Date().toISOString().slice(0,10),notas:""});setShowCF(false);setCErr("");}
  function saveCons(id){const c=consignaciones.find(x=>x.id===id);const v=parseInt(ecf.cantVend)||0,d=parseInt(ecf.cantDev)||0;if(v+d>c.cantEnv){alert("Vendidos + devueltos no puede superar lo enviado.");return;}onSaveConsignaciones(consignaciones.map(x=>x.id===id?{...x,cantVend:v,cantDev:d,estado:ecf.estado}:x));setEditCId(null);setToast("Consignación actualizada.");}

  const[showRF,setShowRF]=useState(false);
  const[rf,setRf]=useState({cantidad:"",fecha:new Date().toISOString().slice(0,10),stakeholder:"",nota:""});
  const[rErr,setRErr]=useState("");
  const misRegalos=regalos.filter(r=>r.libroId===libro.id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  function subReg(){if(!rf.cantidad||!rf.fecha||!rf.stakeholder.trim()){setRErr("Completa todos los campos.");return;}const c=parseInt(rf.cantidad);if(!c||c<=0){setRErr("Cantidad inválida.");return;}const fr=calcStock(libro.id,regalos,consignaciones,libros);if(c>fr.disp){setRErr(`Disponible: ${fr.disp} ej.`);return;}onSaveRegalos([...regalos,{id:uid(),libroId:libro.id,cantidad:c,fecha:rf.fecha,stakeholder:rf.stakeholder.trim(),nota:rf.nota}]);setToast(`${c} ejs. registrados.`);setRf({cantidad:"",fecha:new Date().toISOString().slice(0,10),stakeholder:"",nota:""});setShowRF(false);setRErr("");}

  const EC={activa:{bg:BLL,cl:BL},liquidada:{bg:GRL,cl:GR},devuelta:{bg:ORL,cl:OR}};

  return<div ref={ref} className="pin" style={{background:W,border:`2px solid ${G}`,borderRadius:10,overflow:"hidden",boxShadow:"0 8px 32px rgba(16,43,66,.13)",marginBottom:8}}>

    <div style={{background:N,padding:"16px 22px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
        <div style={{flex:1}}>
          <div style={{color:G,fontSize:10,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",marginBottom:4}}>{libro.cat} · {libro.ano||"Sin año"}</div>
          <h2 style={{color:W,fontSize:15,fontFamily:"Libre Baskerville,serif",lineHeight:1.35,margin:0}}>{libro.titulo}</h2>
          <div style={{color:"rgba(255,255,255,.65)",fontSize:13,marginTop:4}}>{libro.autor}</div>
          <div style={{display:"flex",gap:18,marginTop:8,flexWrap:"wrap",fontSize:12,color:"rgba(255,255,255,.5)"}}>

        </div>
      </div>
    </div>
    {editingInfo&&<div style={{padding:"16px 22px",background:"#F0F4FF",borderBottom:"1px solid #C7D2FE"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span style={{fontWeight:700,fontSize:14,color:N}}>Editar información</span>
        <Btn sm v="danger" onClick={handleDelete}>🗑 Eliminar libro</Btn>
      </div>
      <BookForm initial={libroToForm(libro)} initBod={libro.bodegas||BLANK_BOD()} bodegaNames={bodegaNames} onSave={handleSaveInfo} onCancel={()=>setEditingInfo(false)} isEdit={true}/>
    </div>}
    <div style={{padding:"14px 22px",background:"#F9F7F3",borderBottom:`1px solid ${G2}`}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:14}}>
        {[["Stock inicial",libro.si,N],["Mal estado",s.malEstado,RD],["Regalados",s.regalados,G],["En consignación",s.enConsig,"#2563EB"],["Disponible",s.disp,dispColor]].map(([lbl,val,col])=>
          <div key={lbl} style={{textAlign:"center",padding:"11px 6px",background:W,borderRadius:8,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>

      <div style={{fontSize:11,fontWeight:700,color:N,textTransform:"uppercase",letterSpacing:".5px",marginBottom:8}}>📦 Distribución por bodega</div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div style={{gridColumn:"1/-1"}}><LBL ch="Distribuidora *"/><Inp value={cf.distribuidor} onChange={v=>setCf({...cf,distribuidor:v})} style={{width:"100%"}}/></div>
            <div><LBL ch="Cantidad *"/><Inp type="number" value={cf.cantEnv} onChange={v=>setCf({...cf,cantEnv:v})} min="1" style={{width:"100%"}}/></div>
            <div><LBL ch="Fecha envío *"/><Inp type="date" value={cf.fechaEnv} onChange={v=>setCf({...cf,fechaEnv:v})} style={{width:"100%"}}/></div>

              {[["Enviado",c.cantEnv,"#374151"],["Vendido",c.cantVend||0,GR],["Devuelto",c.cantDev||0,OR],["En consig.",neto,"#2563EB"]].map(([lbl,val,col])=>
                <div key={lbl} style={{textAlign:"center",background:W,border:"1px solid #E5E7EB",borderRadius:6,padding:"5px 4px"}}><div style={{fontSize:15,fontWeight:700,color:col}}>{val}</div><div style={{fontSize:10,color:MU}}>{lbl}</div></div>

          </div>

      </div>
    </div>
  </div>;
}

/* ── GESTIONAR BODEGAS ── */
function BodegaManager({bodegas,libros,onSaveBodegas,onSaveLibros}){
  const[open,setOpen]=useState(false);
  const[nueva,setNueva]=useState("");
  const[err,setErr]=useState("");

  function addBodega(){
    const name=nueva.trim();
    if(!name){setErr("Escribe un nombre.");return;}
    if(bodegas.includes(name)){setErr("Ya existe una bodega con ese nombre.");return;}
    const newList=[...bodegas,name];
    const newLibros=libros.map(l=>({...l,bodegas:{...l.bodegas,[name]:0}}));
    onSaveBodegas(newList);
    onSaveLibros(newLibros);
    setNueva("");setErr("");
  }

  function delBodega(name){
    const totalStock=libros.reduce((s,l)=>s+(l.bodegas?.[name]||0),0);
    const msg=totalStock>0
      ?`La bodega "${name}" tiene ${totalStock} ejemplares registrados. Al eliminarla, ese conteo se perderá. ¿Continuar?`
      :`¿Eliminar la bodega "${name}"?`;
    if(!window.confirm(msg))return;
    const newList=bodegas.filter(b=>b!==name);
    const newLibros=libros.map(l=>{const bod={...l.bodegas};delete bod[name];return{...l,bodegas:bod};});
    onSaveBodegas(newList);
    onSaveLibros(newLibros);
  }

  return<div style={{marginBottom:16}}>
    <button onClick={()=>setOpen(o=>!o)} style={{background:"none",border:`1px solid #D1D5DB`,borderRadius:6,padding:"6px 14px",cursor:"pointer",fontSize:12,color:MU,fontFamily:"DM Sans,sans-serif",display:"flex",alignItems:"center",gap:6}}>
      🏭 {open?"Ocultar":"Gestionar bodegas"} ({bodegas.length})
    </button>
    {open&&<div className="pin" style={{marginTop:10,background:W,borderRadius:8,padding:18,border:"1px solid #E5E7EB",boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}>
      <div style={{fontWeight:700,fontSize:13,color:N,marginBottom:12}}>Bodegas activas</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
        {bodegas.map(b=><div key={b} style={{display:"flex",alignItems:"center",gap:6,background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:20,padding:"4px 12px"}}>
          <span style={{fontSize:12,fontWeight:600,color:BL}}>{b}</span>
          <button onClick={()=>delBodega(b)} style={{background:"none",border:"none",cursor:"pointer",color:RD,fontSize:14,lineHeight:1,padding:0}}>✕</button>
        </div>)}
      </div>
      <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
        <div style={{flex:1}}>
          <LBL ch="Nueva bodega"/>
          <Inp value={nueva} onChange={setNueva} placeholder="Ej: Sede Concepción" onKeyDown={e=>{if(e.key==="Enter")addBodega();}} style={{width:"100%"}}/>
        </div>
        <Btn v="green" onClick={addBodega}>+ Agregar</Btn>
      </div>
      {err&&<div style={{color:RD,fontSize:12,marginTop:8}}>{err}</div>}
      <div style={{marginTop:10,fontSize:11,color:MU}}>Eliminar una bodega con stock solo borra el registro del conteo — los libros físicos siguen en bodega.</div>
    </div>}
  </div>;
}

function Catalogo({libros,regalos,consignaciones,onSaveLibros,onSaveRegalos,onSaveConsignaciones,bodegas,onSaveBodegas}){
  const[q,setQ]=useState(""),[cat,setCat]=useState(""),[selId,setSelId]=useState(null);
  const[addOpen,setAddOpen]=useState(false);
  const[toast,setToast]=useState("");
  const cats=[...new Set(libros.map(l=>l.cat))].sort();
  const filtered=useMemo(()=>libros.filter(l=>{const qL=q.toLowerCase();return(!q||l.titulo.toLowerCase().includes(qL)||l.autor.toLowerCase().includes(qL)||(l.isbn||"").includes(qL))&&(!cat||l.cat===cat);}),[q,cat,libros]);
  function handleAdd(f,bod){const n=formToLibro(f,uid(),bod);onSaveLibros([...libros,n]);setAddOpen(false);setToast(`"${trunc(n.titulo,40)}" agregado.`);}

      <Btn v="green" onClick={()=>{setAddOpen(o=>!o);setSelId(null);}}>{addOpen?"✕ Cancelar":"+ Agregar libro"}</Btn>
      <span style={{fontSize:11,color:MU,marginLeft:"auto"}}>{filtered.length}/{libros.length} · <span style={{color:G,fontWeight:600}}>clic en fila para gestionar</span></span>
    </div>
    {addOpen&&<div className="pin" style={{marginBottom:18}}>
      <div style={{background:N,padding:"11px 18px",borderRadius:"8px 8px 0 0"}}><span style={{color:W,fontWeight:600,fontSize:14}}>Agregar nuevo título</span></div>
      <div style={{padding:18,background:W,borderRadius:"0 0 8px 8px",border:"1px solid #E5E7EB",borderTop:"none"}}><BookForm onSave={handleAdd} onCancel={()=>setAddOpen(false)}/></div>
    </div>}
    <div style={{background:W,borderRadius:8,boxShadow:"0 1px 6px rgba(0,0,0,.07)",overflow:"hidden"}}>

        <thead><tr style={{background:N}}><TH ch=""/><TH ch="Título"/><TH ch="Autor"/><TH ch="Año" center/><TH ch="P. USS" center/><TH ch="Disponible" center/><TH ch="Consig." center/><TH ch="Regalados" center/><TH ch="Stock inicial" center/></tr></thead>
        <tbody>
          {filtered.map((l,i)=>{
            const s=calcStock(l.id,regalos,consignaciones,libros);
            const dc=s.disp<=0?RD:s.disp<10?"#DC2626":s.disp<20?"#D97706":s.disp<50?"#CA8A04":GR;
            const isSel=selId===l.id;
            return<React.Fragment key={l.id}>
              <tr className={`rh${isSel?" rsel":""}`} onClick={()=>{setSelId(isSel?null:l.id);setAddOpen(false);}}

/* ── ESCÁNER ── */
function Scanner({libros,regalos,consignaciones,onSaveRegalos,onSaveLibros,onSaveConsignaciones,bodegas}){
  const scanRef=useRef(null); // ref directo al input del DOM
  const[found,setFound]=useState(null);
  const[notFound,setNotFound]=useState(false);
  const[action,setAction]=useState(null);
  const[qty,setQty]=useState("1");
  const[stakeholder,setStakeholder]=useState("");
  const[distribuidor,setDistribuidor]=useState("");
  const[bodegaEntrada,setBodegaEntrada]=useState("");
  const[notaRegalo,setNotaRegalo]=useState("");
  const[isbnEscaneado,setIsbnEscaneado]=useState("");
  const[addingNew,setAddingNew]=useState(false);
  const[fecha,setFecha]=useState(new Date().toISOString().slice(0,10));
  const[msg,setMsg]=useState("");
  const[display,setDisplay]=useState(""); // solo para mostrar en pantalla
  useEffect(()=>{setTimeout(()=>scanRef.current?.focus(),100);},[]);

  function reset(){
    setFound(null);setAction(null);setQty("1");setStakeholder("");setDistribuidor("");setNotaRegalo("");setAddingNew(false);setNotFound(false);
    setDisplay("");
    if(scanRef.current){scanRef.current.value="";scanRef.current.focus();}
  }

  function handleScan(){
    // Lee directamente del DOM — nunca falla por estado desactualizado
    const clean=(scanRef.current?.value||"").trim();
    if(!clean)return;
    const book=libros.find(l=>l.isbn&&String(l.isbn).trim()===clean);
    if(book){setFound(book);setNotFound(false);setAction(null);setQty("1");}
    else{setFound(null);setNotFound(true);setIsbnEscaneado(clean);}
    setDisplay("");
    if(scanRef.current){scanRef.current.value="";scanRef.current.focus();}
  }

  function doEntrada(){
    const q=parseInt(qty);if(!q||q<=0)return;
    const bod=bodegaEntrada||(bodegas&&bodegas[0])||"";
    onSaveLibros(libros.map(l=>{
      if(l.id!==found.id)return l;
      const newBod=bod?{...l.bodegas,[bod]:(l.bodegas?.[bod]||0)+q}:l.bodegas;
      return{...l,si:l.si+q,bodegas:newBod};
    }));
    setMsg(`✓ Entrada: +${q} ejs.${bod?` → ${bod}`:""} de "${trunc(found.titulo,35)}"`);reset();
  }

  function doVenta(){
    const q=parseInt(qty);if(!q||q<=0)return;
    const s=calcStock(found.id,regalos,consignaciones,libros);
    if(q>s.disp){setMsg(`⚠ Stock insuficiente. Disponible: ${s.disp} ejs.`);return;}
    onSaveLibros(libros.map(l=>l.id===found.id?{...l,si:Math.max(0,l.si-q)}:l));
    setMsg(`✓ Venta: -${q} ejs. de "${trunc(found.titulo,35)}"`);reset();
  }

  function doRegalo(){
    const q=parseInt(qty);if(!q||q<=0||!stakeholder.trim())return;
    const s=calcStock(found.id,regalos,consignaciones,libros);
    if(q>s.disp){setMsg(`⚠ Stock insuficiente. Disponible: ${s.disp} ejs.`);return;}
    onSaveRegalos([...regalos,{id:uid(),libroId:found.id,cantidad:q,fecha,stakeholder:stakeholder.trim(),nota:notaRegalo.trim()||"Escáner"}]);
    setMsg(`✓ Regalo: ${q} ejs. → ${stakeholder}`);reset();
  }

  function doConsignacion(){
    const q=parseInt(qty);if(!q||q<=0||!distribuidor.trim())return;
    const s=calcStock(found.id,regalos,consignaciones,libros);
    if(q>s.disp){setMsg(`⚠ Stock insuficiente. Disponible: ${s.disp} ejs.`);return;}
    onSaveConsignaciones([...consignaciones,{id:uid(),libroId:found.id,distribuidor:distribuidor.trim(),cantEnv:q,cantVend:0,cantDev:0,fechaEnv:fecha,notas:"Escáner",estado:"activa"}]);
    setMsg(`✓ Consignación: ${q} ejs. → ${distribuidor}`);reset();
  }

  const s=found?calcStock(found.id,regalos,consignaciones,libros):null;

  return<div>
    <h2 style={{color:N,fontSize:17,fontFamily:"Libre Baskerville,serif",marginBottom:6}}>Escáner de código de barras</h2>
    <p style={{color:MU,fontSize:13,marginBottom:20,lineHeight:1.6}}>Conecta tu lector USB, haz clic en el campo de abajo y escanea cualquier libro.</p>
    <div style={{background:W,borderRadius:10,padding:24,marginBottom:20,boxShadow:"0 1px 6px rgba(0,0,0,.07)",border:`2px solid ${G}`}}>
      <div style={{display:"flex",gap:12,alignItems:"center"}}>
        <div style={{fontSize:32}}>📷</div>
        <div style={{flex:1}}>
          <LBL ch="Escanea o escribe un ISBN"/>
          <div style={{display:"flex",gap:10}}>
            <input
              ref={scanRef}
              onChange={e=>setDisplay(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();handleScan();}}}
              placeholder="Apunta el lector al código de barras…"
              autoFocus
              style={{flex:1,fontSize:15,padding:"10px 14px",border:`2px solid ${G}`,background:"#FFFBF0",borderRadius:6,outline:"none",fontFamily:"DM Sans,sans-serif",color:N}}/>
            <Btn v="secondary" onClick={handleScan}>Buscar</Btn>
          </div>
        </div>
      </div>
      <div style={{marginTop:10,fontSize:11,color:MU}}>💡 El lector envía el ISBN y un Enter automáticamente — solo apunta y escanea.</div>
    </div>
    {msg&&<div style={{marginBottom:16,padding:"10px 16px",background:msg.startsWith("⚠")?ORL:GRL,borderRadius:8,fontSize:13,color:msg.startsWith("⚠")?OR:GR,fontWeight:500}}>{msg}<button onClick={()=>setMsg("")} style={{float:"right",background:"none",border:"none",cursor:"pointer",color:"inherit",fontSize:16}}>✕</button></div>}
    {notFound&&!addingNew&&<div className="pin" style={{padding:18,background:RDL,border:`1px solid #FCA5A5`,borderRadius:8,marginBottom:16}}>
      <div style={{fontSize:13,color:RD,fontWeight:600,marginBottom:10}}>❌ ISBN <code style={{background:"#FEE2E2",padding:"1px 6px",borderRadius:3}}>{isbnEscaneado}</code> no está en el catálogo.</div>
      <div style={{display:"flex",gap:10}}>
        <Btn v="green" onClick={()=>setAddingNew(true)}>+ Agregar este libro al catálogo</Btn>
        <Btn v="ghost" onClick={()=>{setNotFound(false);setIsbnEscaneado("");scanRef.current?.focus();}}>Cancelar</Btn>
      </div>
    </div>}
    {addingNew&&<div className="pin" style={{marginBottom:16,background:W,borderRadius:10,overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,.1)"}}>
      <div style={{background:GR,padding:"11px 18px"}}><span style={{color:W,fontWeight:600,fontSize:14}}>+ Agregar nuevo libro — ISBN {isbnEscaneado}</span></div>
      <div style={{padding:18}}>
        <BookForm
          initial={{titulo:"",autor:"",isbn:isbnEscaneado,pN:"",pU:"",ano:"",si:"",me:"0",cat:"Historia y Política",catCustom:""}}
          initBod={bodegas?Object.fromEntries(bodegas.map(k=>[k,0])):undefined}
          bodegaNames={bodegas}
          onSave={(f,bod)=>{
            const nuevo=formToLibro(f,uid(),bod);
            onSaveLibros([...libros,nuevo]);
            setAddingNew(false);setNotFound(false);
            setFound(nuevo);setMsg(`✓ "${trunc(nuevo.titulo,35)}" agregado al catálogo.`);
          }}
          onCancel={()=>{setAddingNew(false);setNotFound(false);setIsbnEscaneado("");scanRef.current?.focus();}}
        />
      </div>
    </div>}
    {found&&<div className="pin" style={{background:W,borderRadius:10,border:"2px solid #2563EB",overflow:"hidden",boxShadow:"0 4px 20px rgba(37,99,235,.15)"}}>
      <div style={{background:"#1E3A8A",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{color:"#93C5FD",fontSize:10,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",marginBottom:3}}>{found.cat} · ISBN {found.isbn}</div>
          <div style={{color:W,fontSize:14,fontFamily:"Libre Baskerville,serif",fontWeight:700}}>{trunc(found.titulo,70)}</div>
          <div style={{color:"rgba(255,255,255,.6)",fontSize:12,marginTop:3}}>{found.autor}</div>
        </div>
        <button onClick={reset} style={{background:"rgba(255,255,255,.15)",border:"none",cursor:"pointer",color:W,fontSize:16,width:28,height:28,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
      </div>
      <div style={{padding:"12px 20px",background:"#EFF6FF",display:"flex",gap:20,fontSize:13,borderBottom:"1px solid #BFDBFE",flexWrap:"wrap"}}>
        {[["Stock inicial",found.si,N],["Disponible",s.disp,s.disp<=0?RD:s.disp<20?"#D97706":GR],["Regalados",s.regalados,G],["En consig.",s.enConsig,"#2563EB"]].map(([lbl,val,col])=>
          <div key={lbl} style={{textAlign:"center",minWidth:70}}><div style={{fontSize:20,fontWeight:700,color:col,fontFamily:"Libre Baskerville,serif"}}>{val}</div><div style={{fontSize:10,color:MU}}>{lbl}</div></div>
        )}
      </div>
      <div style={{padding:"16px 20px"}}>
        {!action&&<div>
          <div style={{fontSize:12,color:MU,marginBottom:12,fontWeight:600,textTransform:"uppercase",letterSpacing:".5px"}}>¿Qué quieres registrar?</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Btn v="green" onClick={()=>setAction("entrada")}>📥 Entrada de stock</Btn>
            <Btn v="primary" onClick={()=>setAction("venta")}>💰 Salida por venta</Btn>
            <Btn v="blue" onClick={()=>setAction("consignacion")}>📦 Consignación</Btn>
            <Btn v="secondary" onClick={()=>setAction("regalo")}>🎁 Regalo / Donación</Btn>
          </div>
        </div>}
        {action==="entrada"&&<div>
          <div style={{fontSize:13,fontWeight:600,color:GR,marginBottom:12}}>📥 Entrada de stock — se suma al stock inicial</div>
          <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div><LBL ch="Cantidad a agregar"/><Inp type="number" value={qty} onChange={setQty} min="1" autoFocus={true} style={{width:120}}/></div>
            {bodegas&&bodegas.length>0&&<div><LBL ch="Bodega de destino"/>
              <Sel value={bodegaEntrada||(bodegas[0]||"")} onChange={setBodegaEntrada}
                options={bodegas.map(b=>({v:b,l:b}))} style={{minWidth:160}}/>
            </div>}
            <Btn v="green" onClick={doEntrada}>Confirmar entrada</Btn>
            <Btn v="ghost" onClick={()=>setAction(null)}>Cancelar</Btn>
          </div>
        </div>}
        {action==="venta"&&<div>
          <div style={{fontSize:13,fontWeight:600,color:N,marginBottom:12}}>💰 Salida por venta directa</div>
          <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
            <div><LBL ch="Cantidad vendida"/><Inp type="number" value={qty} onChange={setQty} min="1" autoFocus={true} style={{width:130}}/></div>
            <Btn onClick={doVenta}>Confirmar venta</Btn>
            <Btn v="ghost" onClick={()=>setAction(null)}>Cancelar</Btn>
          </div>
          <div style={{marginTop:8,fontSize:11,color:MU}}>Disponible: <strong style={{color:s.disp<=0?RD:GR}}>{s.disp} ejs.</strong></div>
        </div>}
        {action==="consignacion"&&<div>
          <div style={{fontSize:13,fontWeight:600,color:"#2563EB",marginBottom:12}}>📦 Nueva consignación</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,alignItems:"flex-end"}}>

          </div>
          <div style={{marginBottom:10}}><LBL ch="Nota (opcional)"/><Inp value={notaRegalo} onChange={setNotaRegalo} placeholder="Ej: Feria del Libro, reunión protocolar… (deja vacío para 'Escáner')" style={{width:"100%"}}/></div>
          <div style={{display:"flex",gap:10}}>
            <Btn v="secondary" onClick={doRegalo}>Confirmar regalo</Btn>
            <Btn v="ghost" onClick={()=>setAction(null)}>Cancelar</Btn>
          </div>
        </div>}
      </div>
    </div>}
  </div>;

/* ── TRASLADOS ── */
function Traslados({libros,bodegas,onSaveLibros}){
  // Un traslado tiene: origen, y N líneas de (libroId, cantidad, destino)
  const[origen,setOrigen]=useState("");
  const[lineas,setLineas]=useState([]); // [{libroId,cant,destino}]
  const[toast,setToast]=useState("");
  const[err,setErr]=useState("");
  const[historial,setHistorial]=useState(()=>{
    try{const h=localStorage.getItem("uss_traslados");return h?JSON.parse(h):[];}catch{return[];}
  });

  function saveHist(h){setHistorial(h);try{localStorage.setItem("uss_traslados",JSON.stringify(h));}catch{}}

  function addLinea(){
    if(!origen){setErr("Selecciona la bodega de origen primero.");return;}
    setLineas(l=>[...l,{id:uid(),libroId:"",cant:"1",destino:""}]);
    setErr("");
  }

  function updLinea(id,key,val){setLineas(l=>l.map(x=>x.id===id?{...x,[key]:val}:x));}
  function delLinea(id){setLineas(l=>l.filter(x=>x.id!==id));}

  function confirmar(){
    if(!origen){setErr("Selecciona la bodega de origen.");return;}
    if(lineas.length===0){setErr("Agrega al menos un título al traslado.");return;}
    for(const l of lineas){
      if(!l.libroId){setErr("Selecciona el libro en todas las líneas.");return;}
      if(!l.destino){setErr("Selecciona el destino en todas las líneas.");return;}
      if(l.origen===l.destino){setErr("El origen y destino no pueden ser iguales.");return;}
      const q=parseInt(l.cant)||0;
      if(q<=0){setErr("La cantidad debe ser mayor a 0.");return;}
      const libro=libros.find(x=>x.id===l.libroId);
      const enOrigen=libro?.bodegas?.[origen]||0;
      if(q>enOrigen){setErr(`"${libro?.titulo?.slice(0,40)}" solo tiene ${enOrigen} ejs. en ${origen}.`);return;}
    }
    // Aplica todos los movimientos
    const cambios={};
    lineas.forEach(l=>{
      const q=parseInt(l.cant)||0;
      if(!cambios[l.libroId])cambios[l.libroId]={};
      cambios[l.libroId][origen]=(cambios[l.libroId][origen]||0)-q;
      cambios[l.libroId][l.destino]=(cambios[l.libroId][l.destino]||0)+q;
    });
    const nuevosLibros=libros.map(l=>{
      if(!cambios[l.id])return l;
      const newBod={...l.bodegas};
      Object.entries(cambios[l.id]).forEach(([bod,delta])=>{newBod[bod]=(newBod[bod]||0)+delta;});
      return{...l,bodegas:newBod};
    });
    onSaveLibros(nuevosLibros);
    // Guardar en historial
    const reg={id:uid(),fecha:new Date().toISOString().slice(0,10),origen,lineas:lineas.map(l=>({
      titulo:libros.find(x=>x.id===l.libroId)?.titulo||l.libroId,
      cant:parseInt(l.cant)||0,destino:l.destino
    }))};
    saveHist([reg,...historial].slice(0,50));
    setToast(`Traslado confirmado — ${lineas.length} línea(s) actualizadas.`);
    setOrigen("");setLineas([]);setErr("");
  }

  const libroOpts=libros.map(l=>({v:l.id,l:trunc(l.titulo,60)}));
  const bodOpts=bodegas.map(b=>({v:b,l:b}));
  const destOpts=(orig)=>bodegas.filter(b=>b!==orig).map(b=>({v:b,l:b}));

  return<div>
    {toast&&<Toast msg={toast} onClose={()=>setToast("")}/>}
    <h2 style={{color:N,fontSize:17,fontFamily:"Libre Baskerville,serif",marginBottom:6}}>Traslados entre bodegas</h2>
    <p style={{color:MU,fontSize:13,marginBottom:20,lineHeight:1.6}}>Registra el movimiento de libros de una bodega de origen a uno o varios destinos. Las fichas se actualizan automáticamente al confirmar.</p>

    {/* Formulario */}
    <div style={{background:W,borderRadius:10,padding:22,marginBottom:20,boxShadow:"0 1px 6px rgba(0,0,0,.07)",border:`2px solid ${G}`}}>
      <div style={{marginBottom:16}}>
        <LBL ch="Bodega de origen"/>
        <Sel value={origen} onChange={v=>{setOrigen(v);setLineas([]);}} placeholder="Selecciona bodega de origen…" options={bodOpts} style={{minWidth:240}}/>
      </div>

      {origen&&<div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 80px 1fr 32px",gap:10,marginBottom:8,alignItems:"center"}}>
          <div style={{fontSize:11,fontWeight:700,color:N,textTransform:"uppercase",letterSpacing:".5px"}}>Título</div>
          <div style={{fontSize:11,fontWeight:700,color:N,textTransform:"uppercase",letterSpacing:".5px"}}>Cant.</div>
          <div style={{fontSize:11,fontWeight:700,color:N,textTransform:"uppercase",letterSpacing:".5px"}}>Destino</div>
          <div/>
        </div>
        {lineas.map(l=>{
          const libro=libros.find(x=>x.id===l.libroId);
          const enOrigen=libro?.bodegas?.[origen]||0;
          return<div key={l.id} style={{display:"grid",gridTemplateColumns:"1fr 80px 1fr 32px",gap:10,marginBottom:8,alignItems:"center"}}>
            <Sel value={l.libroId} onChange={v=>updLinea(l.id,"libroId",v)} placeholder="Selecciona título…" options={libroOpts} style={{width:"100%"}}/>
            <div>
              <Inp type="number" value={l.cant} onChange={v=>updLinea(l.id,"cant",v)} min="1" max={enOrigen||undefined} style={{width:"100%"}}/>
              {l.libroId&&<div style={{fontSize:10,color:enOrigen===0?RD:MU,marginTop:2}}>Disp: {enOrigen}</div>}
            </div>
            <Sel value={l.destino} onChange={v=>updLinea(l.id,"destino",v)} placeholder="Bodega destino…" options={destOpts(origen)} style={{width:"100%"}}/>
            <button onClick={()=>delLinea(l.id)} style={{background:"none",border:"none",cursor:"pointer",color:RD,fontSize:18,padding:0,lineHeight:1}}>✕</button>
          </div>;
        })}
        <div style={{display:"flex",gap:10,marginTop:12}}>
          <Btn v="ghost" onClick={addLinea}>+ Agregar título</Btn>
          {lineas.length>0&&<Btn v="green" onClick={confirmar}>✓ Confirmar traslado</Btn>}
        </div>
        {err&&<div style={{color:RD,fontSize:12,marginTop:10}}>{err}</div>}
      </div>}
      {!origen&&<div style={{color:MU,fontSize:13,marginTop:8}}>Selecciona la bodega de origen para comenzar.</div>}
    </div>

    {/* Historial */}
    {historial.length>0&&<div>
      <div style={{fontWeight:700,color:N,fontSize:14,marginBottom:12}}>Historial de traslados</div>
      {historial.map(h=><div key={h.id} style={{background:W,borderRadius:8,padding:"14px 18px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)",borderLeft:`3px solid ${G}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontWeight:600,color:N,fontSize:13}}>Desde <span style={{color:"#2563EB"}}>{h.origen}</span></span>
          <span style={{fontSize:12,color:MU}}>{fD(h.fecha)}</span>
        </div>
        {h.lineas.map((l,i)=><div key={i} style={{fontSize:12,color:MU,display:"flex",gap:8,marginBottom:3}}>
          <span style={{color:N,fontWeight:500}}>{trunc(l.titulo,45)}</span>
          <span>→ <strong style={{color:"#2563EB"}}>{l.destino}</strong></span>
          <span style={{color:G,fontWeight:700}}>{l.cant} ejs.</span>
        </div>)}
      </div>)}
    </div>}
  </div>;
}


/* ── VENTAS DIRECTAS ── */
const METODOS=["POS","Depósito / Transferencia","Efectivo","Otro"];

function Ventas({libros,ventas,onSave,regalos,consignaciones}){
  const[open,setOpen]=useState(false);
  const[form,setForm]=useState({libroId:"",cantidad:"1",fecha:new Date().toISOString().slice(0,10),precio:"",metodoPago:"POS",nota:""});
  const[err,setErr]=useState("");
  const[toast,setToast]=useState("");
  const[filtro,setFiltro]=useState("");
  const[filtMetodo,setFiltMetodo]=useState("");
  const set=k=>v=>setForm(p=>({...p,[k]:v}));

  const libroSel=libros.find(l=>l.id===form.libroId);
  const stockSel=form.libroId?calcStock(form.libroId,regalos,consignaciones,libros,ventas):null;

  // Cuando cambia el libro, precarga precio USS
  function onLibroChange(id){
    const l=libros.find(x=>x.id===id);
    setForm(p=>({...p,libroId:id,precio:l?.pU||""}));
  }

  function submit(){
    if(!form.libroId||!form.cantidad||!form.fecha||!form.metodoPago){setErr("Completa todos los campos.");return;}
    const q=parseInt(form.cantidad);const p=parseFloat(form.precio)||0;
    if(!q||q<=0){setErr("Cantidad inválida.");return;}
    if(stockSel&&q>stockSel.disp){setErr(`Stock insuficiente. Disponible: ${stockSel.disp} ejs.`);return;}
    onSave([...ventas,{id:uid(),libroId:form.libroId,cantidad:q,fecha:form.fecha,precio:p,total:q*p,metodoPago:form.metodoPago,nota:form.nota}]);
    setToast(`Venta registrada: ${q} ejs. de "${trunc(libroSel?.titulo,35)}"`);
    setForm({libroId:"",cantidad:"1",fecha:new Date().toISOString().slice(0,10),precio:"",metodoPago:"POS",nota:""});
    setOpen(false);setErr("");
  }

  const vis=ventas.filter(v=>{
    const q=filtro.toLowerCase();
    const tit=libros.find(l=>l.id===v.libroId)?.titulo||"";
    return(!filtro||tit.toLowerCase().includes(q)||v.metodoPago.toLowerCase().includes(q)||v.nota.toLowerCase().includes(q))
      &&(!filtMetodo||v.metodoPago===filtMetodo);
  }).sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const totEjs=ventas.reduce((s,v)=>s+v.cantidad,0);
  const totIngreso=ventas.reduce((s,v)=>s+(v.total||0),0);
  const MBADGE={POS:{bg:"#EFF6FF",cl:"#1D4ED8"},"Depósito / Transferencia":{bg:"#F0FDF4",cl:"#15803D"},Efectivo:{bg:ORL,cl:OR},Otro:{bg:"#F3F4F6",cl:MU}};

  return<div>
    {toast&&<Toast msg={toast} onClose={()=>setToast("")}/>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <div>
        <h2 style={{margin:0,color:N,fontSize:17,fontFamily:"Libre Baskerville,serif"}}>Ventas Directas</h2>
        <p style={{margin:"4px 0 0",color:MU,fontSize:13}}>
          {ventas.length} ventas · {totEjs.toLocaleString("es-CL")} ejs. · Total: <strong style={{color:GR}}>${totIngreso.toLocaleString("es-CL")}</strong>
        </p>
      </div>
      <Btn onClick={()=>setOpen(o=>!o)}>{open?"Cancelar":"+ Registrar venta"}</Btn>
    </div>

    {open&&<div style={{background:W,borderRadius:8,padding:22,marginBottom:18,boxShadow:"0 1px 6px rgba(0,0,0,.07)",borderTop:`3px solid ${GR}`}}>
      <h3 style={{margin:"0 0 16px",color:N,fontSize:14,fontWeight:600}}>Nueva venta directa</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div style={{gridColumn:"1/-1"}}>
          <LBL ch="Título *"/>
          <Sel value={form.libroId} onChange={onLibroChange} options={libros.map(l=>({v:l.id,l:trunc(l.titulo,65)}))} placeholder="Selecciona un libro…" style={{width:"100%"}}/>
          {stockSel&&<div style={{marginTop:5,fontSize:12,color:MU}}>Disponible: <strong style={{color:stockSel.disp<10?RD:stockSel.disp<20?"#D97706":GR}}>{stockSel.disp} ejs.</strong></div>}
        </div>
        <div><LBL ch="Cantidad *"/><Inp type="number" value={form.cantidad} onChange={set("cantidad")} min="1" style={{width:"100%"}}/></div>
        <div><LBL ch="Fecha *"/><Inp type="date" value={form.fecha} onChange={set("fecha")} style={{width:"100%"}}/></div>
        <div><LBL ch="Precio unitario ($)"/><Inp type="number" value={form.precio} onChange={set("precio")} placeholder="Precio por ejemplar" min="0" style={{width:"100%"}}/></div>
        <div><LBL ch="Método de pago *"/>
          <Sel value={form.metodoPago} onChange={set("metodoPago")} options={METODOS.map(m=>({v:m,l:m}))} style={{width:"100%"}}/>
        </div>
        <div style={{gridColumn:"1/-1"}}><LBL ch="Nota (opcional)"/><Inp value={form.nota} onChange={set("nota")} placeholder="Canal, cliente, contexto…" style={{width:"100%"}}/></div>
        {form.cantidad&&form.precio&&<div style={{gridColumn:"1/-1",padding:"10px 14px",background:GRL,borderRadius:6,fontSize:13,color:GR,fontWeight:600}}>
          Total estimado: ${((parseInt(form.cantidad)||0)*(parseFloat(form.precio)||0)).toLocaleString("es-CL")}
        </div>}
      </div>
      {err&&<div style={{color:RD,fontSize:12,marginTop:10}}>{err}</div>}
      <div style={{marginTop:14,display:"flex",gap:10}}>
        <Btn v="green" onClick={submit}>Guardar venta</Btn>
        <Btn v="ghost" onClick={()=>{setOpen(false);setErr("");}}>Cancelar</Btn>
      </div>
    </div>}

    <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
      <Inp value={filtro} onChange={setFiltro} placeholder="Filtrar por título, método o nota…" style={{flex:1,minWidth:240}}/>
      <Sel value={filtMetodo} onChange={setFiltMetodo} placeholder="Todos los métodos" options={METODOS.map(m=>({v:m,l:m}))} style={{minWidth:200}}/>
      {(filtro||filtMetodo)&&<Btn v="ghost" onClick={()=>{setFiltro("");setFiltMetodo("");}}>Limpiar</Btn>}
    </div>

    {vis.length===0
      ?<div style={{background:W,borderRadius:8,padding:48,textAlign:"center",color:MU,fontSize:13}}>{ventas.length===0?"Sin ventas registradas.":"Sin resultados."}</div>
      :<div style={{background:W,borderRadius:8,boxShadow:"0 1px 6px rgba(0,0,0,.07)",overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,fontFamily:"DM Sans,sans-serif"}}>
          <thead><tr style={{background:N,color:W}}>
            {["Fecha","Título","Cant.","P. Unitario","Total","Método","Nota",""].map(h=><th key={h} style={{padding:"9px 12px",textAlign:["Cant.","P. Unitario","Total"].includes(h)?"center":"left",fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>)}
          </tr></thead>
          <tbody>{vis.map((v,i)=>{
            const l=libros.find(x=>x.id===v.libroId);
            const mb=MBADGE[v.metodoPago]||{bg:"#F3F4F6",cl:MU};
            return<tr key={v.id} style={{background:i%2===0?W:"#F9FAFB"}}>
              <td style={{padding:"8px 12px",color:MU,whiteSpace:"nowrap"}}>{fD(v.fecha)}</td>
              <td style={{padding:"8px 12px",color:N,fontWeight:500,maxWidth:240}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{trunc(l?.titulo,52)}</div></td>
              <td style={{padding:"8px 12px",textAlign:"center",fontWeight:700,color:N}}>{v.cantidad}</td>
              <td style={{padding:"8px 12px",textAlign:"center",color:MU}}>{v.precio?`$${Number(v.precio).toLocaleString("es-CL")}`:"—"}</td>
              <td style={{padding:"8px 12px",textAlign:"center",fontWeight:700,color:GR}}>{v.total?`$${Number(v.total).toLocaleString("es-CL")}`:"—"}</td>
              <td style={{padding:"8px 12px"}}><Badge text={v.metodoPago} color={mb.cl} bg={mb.bg}/></td>
              <td style={{padding:"8px 12px",color:"#9CA3AF",fontStyle:"italic"}}>{v.nota||"—"}</td>
              <td style={{padding:"8px 12px",textAlign:"center"}}><Btn sm v="danger" onClick={()=>{if(window.confirm("¿Eliminar esta venta?"))onSave(ventas.filter(x=>x.id!==v.id));}}>✕</Btn></td>
            </tr>;
          })}</tbody>
        </table>
      </div>}
  </div>;
}

/* ── DASHBOARD ── */
function Dashboard({libros,regalos,consignaciones,ventas}){
  const gs=id=>calcStock(id,regalos,consignaciones,libros,ventas||[]);
  const totDisp=useMemo(()=>libros.reduce((s,l)=>s+Math.max(0,gs(l.id).disp),0),[libros,regalos,consignaciones,ventas]);
  const totVentas=useMemo(()=>(ventas||[]).reduce((s,v)=>s+(v.total||0),0),[ventas]);
  const totReg=useMemo(()=>regalos.reduce((s,r)=>s+r.cantidad,0),[regalos]);
  const totCon=useMemo(()=>libros.reduce((s,l)=>s+Math.max(0,gs(l.id).enConsig),0),[libros,consignaciones]);
  const alertas=useMemo(()=>libros.filter(l=>{const d=gs(l.id).disp;return d>=0&&d<20;}),[libros,regalos,consignaciones]);
  const agotados=useMemo(()=>libros.filter(l=>gs(l.id).disp<=0),[libros,regalos,consignaciones]);
  const cats=useMemo(()=>{const m={};libros.forEach(l=>{if(!m[l.cat])m[l.cat]={t:0,d:0};m[l.cat].t++;m[l.cat].d+=Math.max(0,gs(l.id).disp);});return Object.entries(m).sort((a,b)=>b[1].d-a[1].d);},[libros,regalos,consignaciones]);
  const bodTotals=useMemo(()=>{const m=Object.fromEntries(BOD_NAMES.map(k=>[k,0]));libros.forEach(l=>BOD_NAMES.forEach(k=>{m[k]+=(l.bodegas?.[k]||0);}));return m;},[libros]);
  const maxBod=Math.max(...Object.values(bodTotals),1);
  const lastR=[...regalos].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,5);
  const lastC=[...consignaciones].sort((a,b)=>b.fechaEnv.localeCompare(a.fechaEnv)).slice(0,5);
  const ROW={padding:"7px 0",borderBottom:"1px solid #F3F4F6",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"};
  const P=({t,children})=><div style={{background:W,borderRadius:8,boxShadow:"0 1px 6px rgba(0,0,0,.07)",overflow:"hidden"}}><div style={{background:N,padding:"11px 18px"}}><span style={{color:W,fontWeight:600,fontSize:14}}>{t}</span></div><div style={{padding:18}}>{children}</div></div>;
  return<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:14,marginBottom:22}}>
      <KPI label="Títulos en catálogo" value={libros.length} accent={N}/>
      <KPI label="Ejemplares disponibles" value={totDisp.toLocaleString("es-CL")} accent={N}/>
      <KPI label="Regalados / Donados" value={totReg.toLocaleString("es-CL")} accent={G}/>
      <KPI label="En consignación" value={totCon.toLocaleString("es-CL")} accent="#2563EB"/>
      <KPI label="Alertas stock bajo" value={alertas.length} accent="#D97706"/>
      <KPI label="Títulos agotados" value={agotados.length} accent={RD}/>
      <KPI label="Ingresos por ventas" value={`$${totVentas.toLocaleString('es-CL')}`} accent={GR}/>
    </div>
    <div style={{marginBottom:14}}>
      <P t="🏭 Stock por bodega">
        {BOD_NAMES.map(k=>{const v=bodTotals[k];const pct=Math.round((v/maxBod)*100);
          return<div key={k} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,fontWeight:600,color:N}}>{k}</span><span style={{fontSize:13,fontWeight:700,color:"#2563EB"}}>{v.toLocaleString("es-CL")}</span></div>
            <div style={{height:8,background:"#E5E7EB",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:v===0?"#E5E7EB":"#2563EB",borderRadius:4,transition:"width .3s"}}/></div>
          </div>;})}
        <div style={{marginTop:8,fontSize:11,color:MU,textAlign:"right"}}>Total en bodegas: <strong style={{color:N}}>{Object.values(bodTotals).reduce((s,v)=>s+v,0).toLocaleString("es-CL")}</strong></div>
      </P>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
      <P t="⚠ Stock bajo (< 20 ejemplares)">{alertas.length===0?<p style={{fontSize:13,color:MU}}>Sin alertas.</p>:alertas.map(l=>{const d=gs(l.id).disp;return<div key={l.id} style={ROW}><span style={{color:N,maxWidth:"80%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.titulo}</span><span style={{color:d<=0?RD:"#D97706",fontWeight:700}}>{d}</span></div>;})}</P>
      <P t="📊 Resumen por categoría">{cats.map(([c,d])=><div key={c} style={ROW}><span style={{color:N}}>{c}</span><span style={{color:MU,fontSize:12}}>{d.t} tít. · <strong style={{color:N}}>{d.d.toLocaleString("es-CL")}</strong> ejs.</span></div>)}</P>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <P t="🎁 Últimos regalos">{lastR.length===0?<p style={{fontSize:13,color:MU}}>Sin regalos aún.</p>:lastR.map(r=>{const l=libros.find(x=>x.id===r.libroId);return<div key={r.id} style={{padding:"7px 0",borderBottom:"1px solid #F3F4F6",fontSize:13}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:N,fontWeight:600}}>{r.stakeholder}</span><span style={{color:G,fontWeight:700}}>{r.cantidad} ejs. · {fD(r.fecha)}</span></div><div style={{color:MU,fontSize:12}}>{trunc(l?.titulo,55)}</div></div>;})}</P>
      <P t="📦 Últimas consignaciones">{lastC.length===0?<p style={{fontSize:13,color:MU}}>Sin consignaciones aún.</p>:lastC.map(c=>{const l=libros.find(x=>x.id===c.libroId);const n=c.cantEnv-(c.cantVend||0)-(c.cantDev||0);return<div key={c.id} style={{padding:"7px 0",borderBottom:"1px solid #F3F4F6",fontSize:13}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:N,fontWeight:600}}>{c.distribuidor}</span><span style={{color:"#2563EB",fontWeight:700}}>{n} en consig.</span></div><div style={{color:MU,fontSize:12}}>{trunc(l?.titulo,55)}</div></div>;})}</P>
    </div>
  </div>;
}

/* ── REGALOS GLOBAL ── */
function Regalos({libros,regalos,onSave,consignaciones}){
  const[open,setOpen]=useState(false);
  const[form,setForm]=useState({libroId:"",cantidad:"",fecha:new Date().toISOString().slice(0,10),stakeholder:"",nota:""});
  const[err,setErr]=useState(""),[toast,setToast]=useState(""),[filtro,setFiltro]=useState("");
  const libroOpts=libros.map(l=>({v:l.id,l:trunc(l.titulo,65)}));
  const stats=form.libroId?calcStock(form.libroId,regalos,consignaciones,libros):null;
  function submit(){if(!form.libroId||!form.cantidad||!form.fecha||!form.stakeholder.trim()){setErr("Completa todos los campos.");return;}const c=parseInt(form.cantidad);if(!c||c<=0){setErr("Cantidad inválida.");return;}if(stats&&c>stats.disp){setErr(`Disponible: ${stats.disp} ej.`);return;}onSave([...regalos,{id:uid(),libroId:form.libroId,cantidad:c,fecha:form.fecha,stakeholder:form.stakeholder.trim(),nota:form.nota}]);setToast("Registrado.");setForm({libroId:"",cantidad:"",fecha:new Date().toISOString().slice(0,10),stakeholder:"",nota:""});setOpen(false);setErr("");}
  const vis=regalos.filter(r=>{if(!filtro)return true;const q=filtro.toLowerCase();return r.stakeholder.toLowerCase().includes(q)||(libros.find(l=>l.id===r.libroId)?.titulo||"").toLowerCase().includes(q);}).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  return<div>
    {toast&&<Toast msg={toast} onClose={()=>setToast("")}/>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div><h2 style={{margin:0,color:N,fontSize:17,fontFamily:"Libre Baskerville,serif"}}>Regalos y Donaciones</h2><p style={{margin:"4px 0 0",color:MU,fontSize:13}}>{regalos.length} registros · {regalos.reduce((s,r)=>s+r.cantidad,0).toLocaleString("es-CL")} ejs.</p></div><Btn onClick={()=>setOpen(o=>!o)}>{open?"Cancelar":"+ Registrar regalo"}</Btn></div>
    {open&&<div style={{background:W,borderRadius:8,padding:22,marginBottom:18,boxShadow:"0 1px 6px rgba(0,0,0,.07)",borderTop:`3px solid ${G}`}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div style={{gridColumn:"1/-1"}}><LBL ch="Título *"/><Sel value={form.libroId} onChange={v=>setForm({...form,libroId:v})} options={libroOpts} placeholder="Selecciona un libro…" style={{width:"100%"}}/>{stats&&<div style={{marginTop:5,fontSize:12,color:MU}}>Disponible: <strong style={{color:stats.disp<20?"#D97706":GR}}>{stats.disp} ej.</strong></div>}</div>
        <div><LBL ch="Cantidad *"/><Inp type="number" value={form.cantidad} onChange={v=>setForm({...form,cantidad:v})} min="1" style={{width:"100%"}}/></div>
        <div><LBL ch="Fecha *"/><Inp type="date" value={form.fecha} onChange={v=>setForm({...form,fecha:v})} style={{width:"100%"}}/></div>
        <div style={{gridColumn:"1/-1"}}><LBL ch="Stakeholder *"/><Inp value={form.stakeholder} onChange={v=>setForm({...form,stakeholder:v})} style={{width:"100%"}}/></div>
        <div style={{gridColumn:"1/-1"}}><LBL ch="Nota (opcional)"/><Inp value={form.nota} onChange={v=>setForm({...form,nota:v})} style={{width:"100%"}}/></div>
      </div>
      {err&&<div style={{color:RD,fontSize:12,marginTop:10}}>{err}</div>}
      <div style={{marginTop:14,display:"flex",gap:10}}><Btn onClick={submit}>Guardar</Btn><Btn v="ghost" onClick={()=>{setOpen(false);setErr("");}}>Cancelar</Btn></div>
    </div>}
    <div style={{marginBottom:14}}><Inp value={filtro} onChange={setFiltro} placeholder="Filtrar por stakeholder o título…" style={{width:360}}/></div>
    {vis.length===0?<div style={{background:W,borderRadius:8,padding:48,textAlign:"center",color:MU,fontSize:13}}>{regalos.length===0?"Sin regalos registrados.":"Sin resultados."}</div>
    :<div style={{background:W,borderRadius:8,boxShadow:"0 1px 6px rgba(0,0,0,.07)",overflow:"hidden"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
      <thead><tr style={{background:N,color:W}}>{["Fecha","Título","Cant.","Stakeholder","Nota",""].map(h=><th key={h} style={{padding:"9px 12px",textAlign:h==="Cant."?"center":"left",fontWeight:600}}>{h}</th>)}</tr></thead>
      <tbody>{vis.map((r,i)=>{const l=libros.find(x=>x.id===r.libroId);return<tr key={r.id} style={{background:i%2===0?W:"#F9FAFB"}}>
        <td style={{padding:"8px 12px",color:MU,whiteSpace:"nowrap"}}>{fD(r.fecha)}</td>
        <td style={{padding:"8px 12px",color:N,fontWeight:500,maxWidth:240}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{trunc(l?.titulo,52)}</div></td>
        <td style={{padding:"8px 12px",textAlign:"center",fontWeight:700,color:G}}>{r.cantidad}</td>
        <td style={{padding:"8px 12px",color:MU}}>{r.stakeholder}</td>
        <td style={{padding:"8px 12px",color:"#9CA3AF",fontStyle:"italic"}}>{r.nota||"—"}</td>
        <td style={{padding:"8px 12px",textAlign:"center"}}><Btn sm v="danger" onClick={()=>{if(window.confirm("¿Eliminar?"))onSave(regalos.filter(x=>x.id!==r.id));}}>✕</Btn></td>
      </tr>;})}
      </tbody>
    </table></div>}
  </div>;
}

/* ── CONSIGNACIONES GLOBAL ── */
function Consignaciones({libros,consignaciones,onSave,regalos}){
  const[open,setOpen]=useState(false);
  const[form,setForm]=useState({libroId:"",distribuidor:"",cantEnv:"",fechaEnv:new Date().toISOString().slice(0,10),notas:""});
  const[err,setErr]=useState(""),[toast,setToast]=useState("");
  const[editId,setEditId]=useState(null),[ef,setEf]=useState({});
  const[filtEst,setFiltEst]=useState("activa");
  const libroOpts=libros.map(l=>({v:l.id,l:trunc(l.titulo,65)}));
  const stats=form.libroId?calcStock(form.libroId,regalos,consignaciones,libros):null;
  function submit(){if(!form.libroId||!form.distribuidor.trim()||!form.cantEnv||!form.fechaEnv){setErr("Completa todos los campos.");return;}const c=parseInt(form.cantEnv);if(!c||c<=0){setErr("Cantidad inválida.");return;}if(stats&&c>stats.disp){setErr(`Disponible: ${stats.disp} ej.`);return;}onSave([...consignaciones,{id:uid(),libroId:form.libroId,distribuidor:form.distribuidor.trim(),cantEnv:c,cantVend:0,cantDev:0,fechaEnv:form.fechaEnv,notas:form.notas,estado:"activa"}]);setToast("Consignación registrada.");setForm({libroId:"",distribuidor:"",cantEnv:"",fechaEnv:new Date().toISOString().slice(0,10),notas:""});setOpen(false);setErr("");}
  function saveE(id){const c=consignaciones.find(x=>x.id===id);const v=parseInt(ef.cantVend)||0,d=parseInt(ef.cantDev)||0;if(v+d>c.cantEnv){alert("Vendidos + devueltos no puede superar lo enviado.");return;}onSave(consignaciones.map(x=>x.id===id?{...x,cantVend:v,cantDev:d,estado:ef.estado}:x));setEditId(null);setToast("Actualizada.");}
  const EC={activa:{bg:BLL,cl:BL},liquidada:{bg:GRL,cl:GR},devuelta:{bg:ORL,cl:OR}};
  const sorted=[...(filtEst==="todas"?consignaciones:consignaciones.filter(c=>c.estado===filtEst))].sort((a,b)=>b.fechaEnv.localeCompare(a.fechaEnv));
  return<div>
    {toast&&<Toast msg={toast} onClose={()=>setToast("")}/>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div><h2 style={{margin:0,color:N,fontSize:17,fontFamily:"Libre Baskerville,serif"}}>Consignaciones</h2><p style={{margin:"4px 0 0",color:MU,fontSize:13}}>{consignaciones.length} registros · {consignaciones.reduce((s,c)=>s+c.cantEnv,0)} enviados</p></div><Btn onClick={()=>setOpen(o=>!o)}>{open?"Cancelar":"+ Nueva consignación"}</Btn></div>
    {open&&<div style={{background:W,borderRadius:8,padding:22,marginBottom:18,boxShadow:"0 1px 6px rgba(0,0,0,.07)",borderTop:"3px solid #2563EB"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div style={{gridColumn:"1/-1"}}><LBL ch="Título *"/><Sel value={form.libroId} onChange={v=>setForm({...form,libroId:v})} options={libroOpts} placeholder="Selecciona un libro…" style={{width:"100%"}}/>{stats&&<div style={{marginTop:5,fontSize:12,color:MU}}>Disponible: <strong>{stats.disp} ej.</strong></div>}</div>
        <div><LBL ch="Distribuidora *"/><Inp value={form.distribuidor} onChange={v=>setForm({...form,distribuidor:v})} style={{width:"100%"}}/></div>
        <div><LBL ch="Cantidad *"/><Inp type="number" value={form.cantEnv} onChange={v=>setForm({...form,cantEnv:v})} min="1" style={{width:"100%"}}/></div>
        <div><LBL ch="Fecha envío *"/><Inp type="date" value={form.fechaEnv} onChange={v=>setForm({...form,fechaEnv:v})} style={{width:"100%"}}/></div>
        <div><LBL ch="Notas"/><Inp value={form.notas} onChange={v=>setForm({...form,notas:v})} style={{width:"100%"}}/></div>
      </div>
      {err&&<div style={{color:RD,fontSize:12,marginTop:10}}>{err}</div>}
      <div style={{marginTop:14,display:"flex",gap:10}}><Btn onClick={submit}>Guardar</Btn><Btn v="ghost" onClick={()=>{setOpen(false);setErr("");}}>Cancelar</Btn></div>
    </div>}
    <div style={{marginBottom:14,display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:12,color:MU}}>Estado:</span>
      {[["activa","Activas"],["liquidada","Liquidadas"],["devuelta","Devueltas"],["todas","Todas"]].map(([v,l])=><button key={v} onClick={()=>setFiltEst(v)} style={{padding:"5px 14px",borderRadius:20,border:`1px solid ${filtEst===v?N:"#D1D5DB"}`,background:filtEst===v?N:W,color:filtEst===v?W:MU,cursor:"pointer",fontSize:12,fontFamily:"DM Sans,sans-serif",fontWeight:filtEst===v?600:400}}>{l}</button>)}
    </div>
    {sorted.length===0?<div style={{background:W,borderRadius:8,padding:48,textAlign:"center",color:MU,fontSize:13}}>{consignaciones.length===0?"Sin consignaciones registradas.":"Sin registros."}</div>
    :<div style={{background:W,borderRadius:8,boxShadow:"0 1px 6px rgba(0,0,0,.07)",overflow:"hidden"}}><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
      <thead><tr style={{background:N,color:W}}>{["Fecha","Título","Distribuidora","Enviado","Vendido","Devuelto","En consig.","Estado","Acciones"].map(h=><th key={h} style={{padding:"9px 12px",textAlign:["Enviado","Vendido","Devuelto","En consig."].includes(h)?"center":"left",fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
      <tbody>{sorted.map((c,i)=>{const l=libros.find(x=>x.id===c.libroId);const n=c.cantEnv-(c.cantVend||0)-(c.cantDev||0);const ec=EC[c.estado]||{bg:"#F3F4F6",cl:MU};const isE=editId===c.id;return<tr key={c.id} style={{background:i%2===0?W:"#F9FAFB"}}>
        <td style={{padding:"8px 12px",color:MU,whiteSpace:"nowrap"}}>{fD(c.fechaEnv)}</td>
        <td style={{padding:"8px 12px",color:N,fontWeight:500,maxWidth:200}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{trunc(l?.titulo,42)}</div></td>
        <td style={{padding:"8px 12px",color:MU}}>{c.distribuidor}</td>
        <td style={{padding:"8px 12px",textAlign:"center",fontWeight:600}}>{c.cantEnv}</td>
        <td style={{padding:"8px 12px",textAlign:"center"}}>{isE?<Inp type="number" value={ef.cantVend} onChange={v=>setEf({...ef,cantVend:v})} style={{width:55,padding:"3px 7px"}} min="0"/>:<span style={{color:(c.cantVend||0)>0?GR:MU,fontWeight:(c.cantVend||0)>0?700:400}}>{c.cantVend||"—"}</span>}</td>
        <td style={{padding:"8px 12px",textAlign:"center"}}>{isE?<Inp type="number" value={ef.cantDev} onChange={v=>setEf({...ef,cantDev:v})} style={{width:55,padding:"3px 7px"}} min="0"/>:<span style={{color:(c.cantDev||0)>0?OR:MU,fontWeight:(c.cantDev||0)>0?700:400}}>{c.cantDev||"—"}</span>}</td>
        <td style={{padding:"8px 12px",textAlign:"center",fontWeight:700,color:"#2563EB"}}>{n}</td>
        <td style={{padding:"8px 12px"}}>{isE?<Sel value={ef.estado} onChange={v=>setEf({...ef,estado:v})} options={[{v:"activa",l:"Activa"},{v:"liquidada",l:"Liquidada"},{v:"devuelta",l:"Devuelta"}]} style={{fontSize:12,padding:"3px 8px"}}/>:<Badge text={c.estado.charAt(0).toUpperCase()+c.estado.slice(1)} color={ec.cl} bg={ec.bg}/>}</td>
        <td style={{padding:"8px 12px"}}>{isE?<div style={{display:"flex",gap:5}}><Btn sm onClick={()=>saveE(c.id)}>✓</Btn><Btn sm v="ghost" onClick={()=>setEditId(null)}>✕</Btn></div>:<div style={{display:"flex",gap:5}}><Btn sm v="secondary" onClick={()=>{setEditId(c.id);setEf({cantVend:c.cantVend||0,cantDev:c.cantDev||0,estado:c.estado});}}>Actualizar</Btn><Btn sm v="danger" onClick={()=>{if(window.confirm("¿Eliminar?"))onSave(consignaciones.filter(x=>x.id!==c.id));}}>✕</Btn></div>}</td>
      </tr>;})}
      </tbody>
    </table></div></div>}
  </div>;
}

/* ── APP ── */
function App(){
  const[scriptUrl,setScriptUrl]=useState(()=>stGet("uss_gs_url")||null);
  const[state,setState]=useState("init"); // init|loading|ready|error
  const[syncStatus,setSyncStatus]=useState("idle"); // idle|syncing|error
  const[lastSync,setLastSync]=useState(null);
  const[syncErr,setSyncErr]=useState("");
  const[initMsg,setInitMsg]=useState("");
  const[libros,setLibros]=useState(()=>stGet("uss_libros")||SEED);
  const[regalos,setRegalos]=useState(()=>stGet("uss_regalos")||[]);
  const[consignaciones,setCons]=useState(()=>stGet("uss_consignaciones")||[]);
  const[bodegas,setBodegas]=useState(()=>stGet("uss_bodegas")||BOD_NAMES);
  const[ventas,setVentas]=useState(()=>stGet("uss_ventas")||[]);
  const[tab,setTab]=useState("dashboard");

  useEffect(()=>{if(!scriptUrl){setState("unconfigured");return;}bootLoad();},[scriptUrl]);

  async function bootLoad(){
    setState("loading");setInitMsg("Conectando con Google Sheets…");
    try{
      const raw=await gsRead(scriptUrl);
      // raw = {Libros:[[]], Regalos:[[]], Consignaciones:[[]]}
      const librosRaw=rowsToObjects(raw.Libros||[]);
      const regalosRaw=rowsToObjects(raw.Regalos||[]);
      const consRaw=rowsToObjects(raw.Consignaciones||[]);

      if(librosRaw.length>0){
        setLibros(librosRaw);stSet("uss_libros",librosRaw);
        setRegalos(regalosRaw);stSet("uss_regalos",regalosRaw);
        setCons(consRaw);stSet("uss_consignaciones",consRaw);
      } else {
        // First time: push seed data
        setInitMsg("Inicializando planilla con catálogo de 77 títulos…");
        const seedData=stGet("uss_libros")||SEED;
        await gsWrite(scriptUrl,"Libros",[LIBRO_HDR,...seedData.map(libroToRow)]);
        await gsWrite(scriptUrl,"Regalos",[REG_HDR]);
        await gsWrite(scriptUrl,"Consignaciones",[CONS_HDR]);
      }
      setState("ready");setLastSync(new Date());setInitMsg("");
    }catch(e){
      console.error(e);
      // Fall back to localStorage — still usable offline
      setSyncErr("No se pudo conectar con Google Sheets. Trabajando con datos locales.");
      setState("ready");setInitMsg("");
    }
  }

  // Write helpers — fire and forget (no-cors)
  const syncSheet=useCallback(async(sheet,values)=>{
    if(!scriptUrl||state!=="ready")return;
    setSyncStatus("syncing");setSyncErr("");
    try{
      await gsWrite(scriptUrl,sheet,values);
      setSyncStatus("idle");setLastSync(new Date());
    }catch(e){setSyncStatus("error");setSyncErr("Error al guardar: "+e.message);}
  },[scriptUrl,state]);

  const saveLibros=useCallback(d=>{setLibros(d);stSet("uss_libros",d);syncSheet("Libros",[LIBRO_HDR,...d.map(libroToRow)]);},[syncSheet]);
  const saveRegalos=useCallback(d=>{setRegalos(d);stSet("uss_regalos",d);syncSheet("Regalos",[REG_HDR,...d.map(r=>[r.id,r.libroId,r.cantidad,r.fecha,r.stakeholder,r.nota||""])]);},[syncSheet]);
  const saveCons=useCallback(d=>{setCons(d);stSet("uss_consignaciones",d);syncSheet("Consignaciones",[CONS_HDR,...d.map(c=>[c.id,c.libroId,c.distribuidor,c.cantEnv,c.cantVend||0,c.cantDev||0,c.fechaEnv,c.notas||"",c.estado])]);},[syncSheet]);
  const saveBodegas=useCallback(d=>{setBodegas(d);stSet("uss_bodegas",d);},[]);
  const saveVentas=useCallback(d=>{setVentas(d);stSet("uss_ventas",d);syncSheet("Ventas",[VENTAS_HDR,...d.map(v=>[v.id,v.libroId,v.cantidad,v.fecha,v.precio||0,v.total||0,v.metodoPago,v.nota||""])]);},[syncSheet]);

  if(state==="unconfigured")return<SetupScreen onSave={url=>{setScriptUrl(url);stSet("uss_gs_url",url);}}/>;

  if(state==="loading")return<div style={{minHeight:"100vh",background:CR,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
    <div style={{color:N,fontSize:15,fontFamily:"Libre Baskerville,serif"}}>Inventario Ediciones USS</div>
    <div style={{color:MU,fontSize:13}}>{initMsg||"Cargando…"}</div>
    <div style={{width:200,height:3,background:"#E5E7EB",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:G,borderRadius:2,animation:"progress 1.2s infinite ease-in-out"}}/></div>
  </div>;

  const TABS=[["dashboard","📊 Dashboard"],["catalogo","📚 Catálogo"],["scanner","🔍 Escáner"],["traslados","🚛 Traslados"],["ventas","💰 Ventas"],["regalos","🎁 Regalos"],["consignaciones","📦 Consignaciones"]];

  const syncBadge=()=>{
    if(syncStatus==="syncing")return<span style={{fontSize:11,color:G}}>↺ Guardando en Sheets…</span>;
    if(syncStatus==="error")return<span style={{fontSize:11,color:"#FCA5A5"}}>⚠ Error al guardar</span>;
    if(lastSync)return<span style={{fontSize:11,color:"rgba(255,255,255,.5)"}}>✓ Sheets · {lastSync.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"})}</span>;
    return null;
  };

  return<div style={{minHeight:"100vh",background:CR}}>
    <div style={{background:N,padding:"13px 28px",display:"flex",alignItems:"center",gap:16}}>
      <div style={{width:3,height:36,background:G,borderRadius:2}}/>
      <div>
        <div style={{color:G,fontSize:10,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase"}}>Universidad San Sebastián</div>
        <div style={{color:W,fontSize:17,fontWeight:700,fontFamily:"Libre Baskerville,serif",lineHeight:1.2}}>Inventario Ediciones USS</div>
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:14,alignItems:"center"}}>
        {syncBadge()}
        <button onClick={()=>{if(window.confirm("¿Desconectar Google Sheets?")){{localStorage.removeItem("uss_gs_url");setScriptUrl(null);setState("unconfigured");}}}} title="Reconfigurar" style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,.3)",fontSize:16,padding:0}}>⚙</button>
      </div>
    </div>
    {syncErr&&<div style={{background:RDL,borderBottom:"1px solid #FCA5A5",padding:"8px 28px",fontSize:12,color:RD,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>⚠ {syncErr}</span><button onClick={()=>setSyncErr("")} style={{background:"none",border:"none",cursor:"pointer",color:RD,fontSize:16}}>✕</button></div>}
    <div style={{background:W,borderBottom:`2px solid ${G}`,display:"flex",padding:"0 28px",overflowX:"auto"}}>
      {TABS.map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{padding:"11px 18px",border:"none",background:"none",cursor:"pointer",whiteSpace:"nowrap",fontWeight:tab===k?700:400,color:tab===k?N:MU,borderBottom:`3px solid ${tab===k?G:"transparent"}`,fontSize:13,fontFamily:"DM Sans,sans-serif"}}>{l}</button>)}
    </div>
    <div style={{padding:"22px 28px",maxWidth:1500,margin:"0 auto"}}>
      {tab==="dashboard"      &&<Dashboard libros={libros} regalos={regalos} consignaciones={consignaciones} ventas={ventas}/>}
      {tab==="catalogo"       &&<Catalogo libros={libros} regalos={regalos} consignaciones={consignaciones} onSaveLibros={saveLibros} onSaveRegalos={saveRegalos} onSaveConsignaciones={saveCons} bodegas={bodegas} onSaveBodegas={saveBodegas}/>}
      {tab==="scanner"        &&<Scanner libros={libros} regalos={regalos} consignaciones={consignaciones} onSaveRegalos={saveRegalos} onSaveLibros={saveLibros} onSaveConsignaciones={saveCons} bodegas={bodegas}/>}
      {tab==="traslados"      &&<Traslados libros={libros} bodegas={bodegas} onSaveLibros={saveLibros}/>}
      {tab==="ventas"          &&<Ventas libros={libros} ventas={ventas} onSave={saveVentas} regalos={regalos} consignaciones={consignaciones}/>}
      {tab==="regalos"        &&<Regalos libros={libros} regalos={regalos} onSave={saveRegalos} consignaciones={consignaciones}/>}
      {tab==="consignaciones" &&<Consignaciones libros={libros} consignaciones={consignaciones} onSave={saveCons} regalos={regalos}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
