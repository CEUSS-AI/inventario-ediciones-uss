/* ── Storage ─────────────────────────────────────────────────── */
function stGet(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch{return null;}}
function stSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

/* ── Stock ───────────────────────────────────────────────────── */
function calcStock(libroId,regalos,consignaciones,libros){
  const l=libros.find(x=>x.id===libroId);
  if(!l)return{disp:0,enConsig:0,regalados:0,malEstado:0};
  const regalados=regalos.filter(r=>r.libroId===libroId).reduce((s,r)=>s+r.cantidad,0);
  const enConsig=consignaciones.filter(c=>c.libroId===libroId).reduce((s,c)=>s+c.cantEnv-(c.cantVend||0)-(c.cantDev||0),0);
  return{disp:l.si-l.me-regalados-enConsig,enConsig,regalados,malEstado:l.me};
}

/* ── Primitives ──────────────────────────────────────────────── */
function Btn({children,onClick,v="primary",sm,disabled,style={}}){
  const m={primary:{bg:N,cl:W,br:N},secondary:{bg:G,cl:N,br:G},ghost:{bg:"transparent",cl:N,br:"#D1D5DB"},danger:{bg:RD,cl:W,br:RD},blue:{bg:"#2563EB",cl:W,br:"#2563EB"},green:{bg:GR,cl:W,br:GR}};
  const{bg,cl,br}=m[v]||m.primary;
  return<button onClick={onClick} disabled={disabled} style={{padding:sm?"5px 10px":"8px 18px",background:disabled?"#E5E7EB":bg,color:disabled?"#9CA3AF":cl,border:`1px solid ${disabled?"#E5E7EB":br}`,borderRadius:6,cursor:disabled?"not-allowed":"pointer",fontWeight:600,fontSize:sm?12:13,fontFamily:"DM Sans,sans-serif",lineHeight:1.4,...style}}>{children}</button>;
}
function Inp({value,onChange,type="text",placeholder,style={},min,max,readOnly}){
  return<input type={type} value={value??""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} min={min} max={max} readOnly={readOnly}
    style={{padding:"7px 11px",border:`1px solid ${readOnly?"#E5E7EB":"#D1D5DB"}`,borderRadius:6,fontSize:13,outline:"none",fontFamily:"DM Sans,sans-serif",color:readOnly?MU:N,background:readOnly?"#F9FAFB":W,...style}}/>;
}
function Sel({value,onChange,options,placeholder,style={}}){
  return<select value={value} onChange={e=>onChange(e.target.value)} style={{padding:"7px 11px",border:"1px solid #D1D5DB",borderRadius:6,fontSize:13,fontFamily:"DM Sans,sans-serif",color:N,background:W,...style}}>
    {placeholder&&<option value="">{placeholder}</option>}
    {options.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
  </select>;
}
function Badge({text,color=GR,bg=GRL}){return<span style={{background:bg,color,padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{text}</span>;}
function Toast({msg,onClose}){useEffect(()=>{const t=setTimeout(onClose,3200);return()=>clearTimeout(t);},[]);return<div style={{position:"fixed",bottom:24,right:24,background:N,color:W,padding:"12px 22px",borderRadius:8,boxShadow:"0 6px 24px rgba(0,0,0,.25)",fontSize:13,zIndex:9999,borderLeft:`4px solid ${G}`}}>✓ {msg}</div>;}
function KPI({label,value,accent=N}){return<div style={{background:W,borderRadius:8,padding:"16px 18px",borderLeft:`4px solid ${accent}`,boxShadow:"0 1px 6px rgba(0,0,0,.07)"}}><div style={{fontSize:26,fontWeight:700,color:accent,fontFamily:"Libre Baskerville,serif",lineHeight:1}}>{value}</div><div style={{fontSize:11,color:MU,marginTop:5}}>{label}</div></div>;}
function SH({title,action}){return<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",background:"#F1EDE4",borderRadius:6,marginBottom:12,borderLeft:`3px solid ${G}`}}><span style={{fontWeight:700,fontSize:13,color:N}}>{title}</span>{action}</div>;}
function LBL({ch}){return<label style={{fontSize:11,fontWeight:600,color:N,display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>{ch}</label>;}
function Divider(){return<div style={{height:1,background:"#E5E7EB",margin:"18px 0"}}/>;}

/* ── BOOK FORM (add + edit) ──────────────────────────────────── */
const BLANK={titulo:"",autor:"",isbn:"",pN:"",pU:"",ano:"",si:"",me:"0",cat:"Historia y Política",catCustom:""};
function libroToForm(l){
  return{titulo:l.titulo||"",autor:l.autor||"",isbn:l.isbn||"",pN:l.pN??""  ,pU:l.pU??"",ano:l.ano??"",si:l.si??"",me:l.me??"0",cat:CATS.includes(l.cat)?l.cat:"__otra__",catCustom:CATS.includes(l.cat)?"":l.cat};
}
function formToLibro(f,id){
  const cat=f.cat==="__otra__"?(f.catCustom.trim()||"Sin categoría"):f.cat;
  return{id,titulo:f.titulo.trim(),autor:f.autor.trim(),isbn:f.isbn.trim()||null,pN:toNum(f.pN),pU:toNum(f.pU),ano:toNum(f.ano),si:parseInt(f.si)||0,me:parseInt(f.me)||0,cat};
}

function BookForm({initial=BLANK,onSave,onCancel,isEdit=false}){
  const[f,setF]=useState(initial);
  const[err,setErr]=useState("");
  const set=k=>v=>setF(p=>({...p,[k]:v}));
  function submit(){
    if(!f.titulo.trim()){setErr("El título es obligatorio.");return;}
    if(f.si===""||isNaN(parseInt(f.si))){setErr("El stock inicial es obligatorio.");return;}
    if(f.cat==="__otra__"&&!f.catCustom.trim()){setErr("Escribe el nombre de la categoría.");return;}
    setErr("");
    onSave(f);
  }
  const G2=({col=2,children})=><div style={{gridColumn:`1/${col+1}`}}>{children}</div>;
  return(
    <div style={{background:"#F8F9FF",border:"1px solid #C7D2FE",borderRadius:8,padding:18}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        {/* Título — full width */}
        <div style={{gridColumn:"1/-1"}}>
          <LBL ch="Título *"/>
          <Inp value={f.titulo} onChange={set("titulo")} placeholder="Título completo del libro" style={{width:"100%"}}/>
        </div>
        {/* Autor — full width */}
        <div style={{gridColumn:"1/-1"}}>
          <LBL ch="Autor(es)"/>
          <Inp value={f.autor} onChange={set("autor")} placeholder="Nombre(s) del autor o autores" style={{width:"100%"}}/>
        </div>
        {/* ISBN */}
        <div>
          <LBL ch="ISBN"/>
          <Inp value={f.isbn} onChange={set("isbn")} placeholder="Ej: 9789566115786" style={{width:"100%"}}/>
        </div>
        {/* Año */}
        <div>
          <LBL ch="Año de publicación"/>
          <Inp type="number" value={f.ano} onChange={set("ano")} placeholder="Ej: 2024" min="1900" max="2099" style={{width:"100%"}}/>
        </div>
        {/* Precio Normal */}
        <div>
          <LBL ch="Precio Normal ($)"/>
          <Inp type="number" value={f.pN} onChange={set("pN")} placeholder="Ej: 18000" min="0" style={{width:"100%"}}/>
        </div>
        {/* Precio USS */}
        <div>
          <LBL ch="Precio USS ($)"/>
          <Inp type="number" value={f.pU} onChange={set("pU")} placeholder="Ej: 14400" min="0" style={{width:"100%"}}/>
        </div>
        {/* Stock inicial */}
        <div>
          <LBL ch={isEdit?"Stock inicial * (afecta disponible)":"Stock inicial *"}/>
          <Inp type="number" value={f.si} onChange={set("si")} placeholder="Ej: 200" min="0" style={{width:"100%"}}/>
          {isEdit&&<div style={{fontSize:11,color:OR,marginTop:3}}>⚠ Modificar esto recalcula el stock disponible.</div>}
        </div>
        {/* Mal estado */}
        <div>
          <LBL ch="Ejemplares en mal estado"/>
          <Inp type="number" value={f.me} onChange={set("me")} placeholder="Ej: 0" min="0" style={{width:"100%"}}/>
        </div>
        {/* Categoría */}
        <div style={{gridColumn:"1/-1"}}>
          <LBL ch="Categoría"/>
          <div style={{display:"flex",gap:8}}>
            <Sel value={f.cat} onChange={set("cat")}
              options={[...CATS.map(c=>({v:c,l:c})),{v:"__otra__",l:"Otra categoría…"}]}
              style={{flex:1}}/>
            {f.cat==="__otra__"&&<Inp value={f.catCustom} onChange={set("catCustom")} placeholder="Nombre de categoría" style={{flex:1}}/>}
          </div>
        </div>
      </div>
      {err&&<div style={{color:RD,fontSize:12,marginBottom:10}}>{err}</div>}
      <div style={{display:"flex",gap:10}}>
        <Btn v="green" onClick={submit}>{isEdit?"✓ Guardar cambios":"+ Agregar libro"}</Btn>
        <Btn v="ghost" onClick={onCancel}>Cancelar</Btn>
      </div>
    </div>
  );
}

/* ── BOOK DETAIL PANEL ───────────────────────────────────────── */
function BookDetailPanel({libro,regalos,consignaciones,libros,onSaveRegalos,onSaveConsignaciones,onSaveLibros,onClose}){
  const ref=useRef(null);
  const[toast,setToast]=useState("");
  const[editingInfo,setEditingInfo]=useState(false);

  useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth",block:"nearest"});},[]);

  const s=calcStock(libro.id,regalos,consignaciones,libros);
  const dispColor=s.disp<=0?RD:s.disp<20?"#D97706":GR;

  /* ── Edit book info ── */
  function handleSaveInfo(f){
    const updated=formToLibro(f,libro.id);
    onSaveLibros(libros.map(l=>l.id===libro.id?updated:l));
    setEditingInfo(false);
    setToast("Información actualizada.");
  }
  function handleDelete(){
    const hasMovs=regalos.some(r=>r.libroId===libro.id)||consignaciones.some(c=>c.libroId===libro.id);
    const msg=hasMovs
      ?"Este libro tiene regalos o consignaciones registrados. ¿Confirmas que deseas eliminarlo? Los movimientos NO se borrarán y quedarán huérfanos."
      :"¿Eliminar este libro del catálogo? Esta acción no se puede deshacer.";
    if(window.confirm(msg)){onSaveLibros(libros.filter(l=>l.id!==libro.id));onClose();}
  }

  /* ── Consignaciones ── */
  const[showCF,setShowCF]=useState(false);
  const[cf,setCf]=useState({distribuidor:"",cantEnv:"",fechaEnv:new Date().toISOString().slice(0,10),notas:""});
  const[cErr,setCErr]=useState("");
  const[editCId,setEditCId]=useState(null);
  const[ecf,setEcf]=useState({});
  const misCons=consignaciones.filter(c=>c.libroId===libro.id).sort((a,b)=>b.fechaEnv.localeCompare(a.fechaEnv));

  function subCons(){
    if(!cf.distribuidor.trim()||!cf.cantEnv||!cf.fechaEnv){setCErr("Completa todos los campos.");return;}
    const c=parseInt(cf.cantEnv);if(!c||c<=0){setCErr("Cantidad inválida.");return;}
    const fresh=calcStock(libro.id,regalos,consignaciones,libros);
    if(c>fresh.disp){setCErr(`Stock insuficiente. Disponible: ${fresh.disp} ej.`);return;}
    onSaveConsignaciones([...consignaciones,{id:uid(),libroId:libro.id,distribuidor:cf.distribuidor.trim(),cantEnv:c,cantVend:0,cantDev:0,fechaEnv:cf.fechaEnv,notas:cf.notas,estado:"activa"}]);
    setToast("Consignación registrada.");setCf({distribuidor:"",cantEnv:"",fechaEnv:new Date().toISOString().slice(0,10),notas:""});setShowCF(false);setCErr("");
  }
  function saveCons(id){
    const c=consignaciones.find(x=>x.id===id);
    const v=parseInt(ecf.cantVend)||0,d=parseInt(ecf.cantDev)||0;
    if(v+d>c.cantEnv){alert("Vendidos + devueltos no puede superar lo enviado.");return;}
    onSaveConsignaciones(consignaciones.map(x=>x.id===id?{...x,cantVend:v,cantDev:d,estado:ecf.estado}:x));
    setEditCId(null);setToast("Consignación actualizada.");
  }

  /* ── Regalos ── */
  const[showRF,setShowRF]=useState(false);
  const[rf,setRf]=useState({cantidad:"",fecha:new Date().toISOString().slice(0,10),stakeholder:"",nota:""});
  const[rErr,setRErr]=useState("");
  const misRegalos=regalos.filter(r=>r.libroId===libro.id).sort((a,b)=>b.fecha.localeCompare(a.fecha));

  function subReg(){
    if(!rf.cantidad||!rf.fecha||!rf.stakeholder.trim()){setRErr("Completa todos los campos.");return;}
    const c=parseInt(rf.cantidad);if(!c||c<=0){setRErr("Cantidad inválida.");return;}
    const fresh=calcStock(libro.id,regalos,consignaciones,libros);
    if(c>fresh.disp){setRErr(`Stock insuficiente. Disponible: ${fresh.disp} ej.`);return;}
    onSaveRegalos([...regalos,{id:uid(),libroId:libro.id,cantidad:c,fecha:rf.fecha,stakeholder:rf.stakeholder.trim(),nota:rf.nota}]);
    setToast(`${c} ejemplares registrados como regalo.`);setRf({cantidad:"",fecha:new Date().toISOString().slice(0,10),stakeholder:"",nota:""});setShowRF(false);setRErr("");
  }

  const EC={activa:{bg:BLL,cl:BL},liquidada:{bg:GRL,cl:GR},devuelta:{bg:ORL,cl:OR}};

  return(
    <div ref={ref} className="panel-in" style={{background:W,border:`2px solid ${G}`,borderRadius:10,overflow:"hidden",boxShadow:"0 8px 32px rgba(16,43,66,.13)",marginBottom:8}}>
      {toast&&<Toast msg={toast} onClose={()=>setToast("")}/>}

      {/* Header */}
      <div style={{background:N,padding:"16px 22px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
          <div style={{flex:1}}>
            <div style={{color:G,fontSize:10,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",marginBottom:4}}>{libro.cat} · {libro.ano||"Sin año"}</div>
            <h2 style={{color:W,fontSize:15,fontFamily:"Libre Baskerville,serif",lineHeight:1.35,margin:0}}>{libro.titulo}</h2>
            <div style={{color:"rgba(255,255,255,.65)",fontSize:13,marginTop:4}}>{libro.autor}</div>
            <div style={{display:"flex",gap:18,marginTop:8,flexWrap:"wrap",fontSize:12,color:"rgba(255,255,255,.5)"}}>
              <span><span style={{color:G}}>ISBN:</span> {libro.isbn||"—"}</span>
              <span><span style={{color:G}}>P. Normal:</span> {f$(libro.pN)}</span>
              <span><span style={{color:G}}>P. USS:</span> {f$(libro.pU)}</span>
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0,alignItems:"flex-start"}}>
            <Btn sm v="secondary" onClick={()=>{setEditingInfo(e=>!e);}} style={{background:editingInfo?G2:"rgba(207,180,124,.2)",color:G,border:`1px solid ${G}`}}>
              {editingInfo?"Cancelar edición":"✏ Editar info"}
            </Btn>
            <button onClick={onClose} style={{background:"rgba(255,255,255,.15)",border:"none",cursor:"pointer",color:W,fontSize:16,width:30,height:30,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
        </div>
      </div>

      {/* Edit info form */}
      {editingInfo&&(
        <div style={{padding:"16px 22px",background:"#F0F4FF",borderBottom:`1px solid #C7D2FE`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontWeight:700,fontSize:14,color:N}}>Editar información del libro</span>
            <Btn sm v="danger" onClick={handleDelete}>🗑 Eliminar libro</Btn>
          </div>
          <BookForm initial={libroToForm(libro)} onSave={handleSaveInfo} onCancel={()=>setEditingInfo(false)} isEdit={true}/>
        </div>
      )}

      {/* Stock summary */}
      <div style={{padding:"14px 22px",background:"#F9F7F3",borderBottom:`1px solid ${G2}`}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
          {[["Stock inicial",libro.si,N],["Mal estado",s.malEstado,RD],["Regalados",s.regalados,G],["En consignación",s.enConsig,"#2563EB"],["Disponible",s.disp,dispColor]].map(([lbl,val,col])=>
            <div key={lbl} style={{textAlign:"center",padding:"11px 6px",background:W,borderRadius:8,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
              <div style={{fontSize:22,fontWeight:700,color:col,fontFamily:"Libre Baskerville,serif"}}>{val}</div>
              <div style={{fontSize:11,color:MU,marginTop:3}}>{lbl}</div>
            </div>
          )}
        </div>
        {s.disp<20&&s.disp>=0&&<div style={{marginTop:10,padding:"7px 14px",background:s.disp===0?RDL:ORL,borderRadius:6,fontSize:12,color:s.disp===0?RD:OR,fontWeight:500}}>{s.disp===0?"⚠ Título agotado.":`⚠ Stock bajo — solo ${s.disp} ejemplares disponibles.`}</div>}
      </div>

      {/* Consig + Regalos */}
      <div style={{padding:"20px 22px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>

        {/* CONSIGNACIONES */}
        <div>
          <SH title="📦 Consignaciones" action={<Btn sm v="blue" onClick={()=>{setShowCF(o=>!o);setCErr("");}}>{showCF?"Cancelar":"+ Nueva"}</Btn>}/>
          {showCF&&(
            <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:8,padding:14,marginBottom:14}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <div style={{gridColumn:"1/-1"}}><LBL ch="Distribuidora *"/><Inp value={cf.distribuidor} onChange={v=>setCf({...cf,distribuidor:v})} placeholder="Ej: Librería Antártica…" style={{width:"100%"}}/></div>
                <div><LBL ch="Cantidad *"/><Inp type="number" value={cf.cantEnv} onChange={v=>setCf({...cf,cantEnv:v})} placeholder="Ej: 20" min="1" style={{width:"100%"}}/></div>
                <div><LBL ch="Fecha envío *"/><Inp type="date" value={cf.fechaEnv} onChange={v=>setCf({...cf,fechaEnv:v})} style={{width:"100%"}}/></div>
                <div style={{gridColumn:"1/-1"}}><LBL ch="Notas"/><Inp value={cf.notas} onChange={v=>setCf({...cf,notas:v})} placeholder="N° contrato, contacto…" style={{width:"100%"}}/></div>
              </div>
              {cErr&&<div style={{color:RD,fontSize:12,marginBottom:8}}>{cErr}</div>}
              <Btn onClick={subCons}>Guardar consignación</Btn>
            </div>
          )}
          {misCons.length===0
            ?<p style={{fontSize:13,color:MU,textAlign:"center",padding:"20px 0"}}>Sin consignaciones para este título.</p>
            :misCons.map(c=>{
              const neto=c.cantEnv-(c.cantVend||0)-(c.cantDev||0);
              const ec=EC[c.estado]||{bg:"#F3F4F6",cl:MU};
              const isE=editCId===c.id;
              return<div key={c.id} style={{border:"1px solid #E5E7EB",borderRadius:8,padding:"12px 14px",marginBottom:10,background:"#FAFAFA"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div><div style={{fontWeight:600,color:N,fontSize:13}}>{c.distribuidor}</div><div style={{fontSize:11,color:MU}}>{fD(c.fechaEnv)}{c.notas?` · ${c.notas}`:""}</div></div>
                  <Badge text={c.estado.charAt(0).toUpperCase()+c.estado.slice(1)} color={ec.cl} bg={ec.bg}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
                  {[["Enviado",c.cantEnv,"#374151"],["Vendido",c.cantVend||0,GR],["Devuelto",c.cantDev||0,OR],["En consig.",neto,"#2563EB"]].map(([lbl,val,col])=>
                    <div key={lbl} style={{textAlign:"center",background:W,border:"1px solid #E5E7EB",borderRadius:6,padding:"5px 4px"}}>
                      <div style={{fontSize:15,fontWeight:700,color:col}}>{val}</div>
                      <div style={{fontSize:10,color:MU}}>{lbl}</div>
                    </div>
                  )}
                </div>
                {isE?(
                  <div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                      <div><LBL ch="Vendidos"/><Inp type="number" value={ecf.cantVend} onChange={v=>setEcf({...ecf,cantVend:v})} style={{width:"100%"}} min="0"/></div>
                      <div><LBL ch="Devueltos"/><Inp type="number" value={ecf.cantDev} onChange={v=>setEcf({...ecf,cantDev:v})} style={{width:"100%"}} min="0"/></div>
                      <div><LBL ch="Estado"/><Sel value={ecf.estado} onChange={v=>setEcf({...ecf,estado:v})} options={[{v:"activa",l:"Activa"},{v:"liquidada",l:"Liquidada"},{v:"devuelta",l:"Devuelta"}]} style={{width:"100%",padding:"6px 8px"}}/></div>
                    </div>
                    <div style={{display:"flex",gap:8}}><Btn sm onClick={()=>saveCons(c.id)}>✓ Guardar</Btn><Btn sm v="ghost" onClick={()=>setEditCId(null)}>Cancelar</Btn></div>
                  </div>
                ):(
                  <div style={{display:"flex",gap:8}}>
                    <Btn sm v="secondary" onClick={()=>{setEditCId(c.id);setEcf({cantVend:c.cantVend||0,cantDev:c.cantDev||0,estado:c.estado});}}>Actualizar</Btn>
                    <Btn sm v="danger" onClick={()=>{if(window.confirm("¿Eliminar consignación?"))onSaveConsignaciones(consignaciones.filter(x=>x.id!==c.id));}}>Eliminar</Btn>
                  </div>
                )}
              </div>;
            })
          }
        </div>

        {/* REGALOS */}
        <div>
          <SH title="🎁 Regalos / Donaciones" action={<Btn sm v="secondary" onClick={()=>{setShowRF(o=>!o);setRErr("");}}>{showRF?"Cancelar":"+ Nuevo"}</Btn>}/>
          {showRF&&(
            <div style={{background:"#FFFBF0",border:`1px solid ${G2}`,borderRadius:8,padding:14,marginBottom:14}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <div><LBL ch="Cantidad *"/><Inp type="number" value={rf.cantidad} onChange={v=>setRf({...rf,cantidad:v})} placeholder="Ej: 3" min="1" style={{width:"100%"}}/></div>
                <div><LBL ch="Fecha *"/><Inp type="date" value={rf.fecha} onChange={v=>setRf({...rf,fecha:v})} style={{width:"100%"}}/></div>
                <div style={{gridColumn:"1/-1"}}><LBL ch="Stakeholder *"/><Inp value={rf.stakeholder} onChange={v=>setRf({...rf,stakeholder:v})} placeholder="Ej: Ministerio de Educación…" style={{width:"100%"}}/></div>
                <div style={{gridColumn:"1/-1"}}><LBL ch="Nota (opcional)"/><Inp value={rf.nota} onChange={v=>setRf({...rf,nota:v})} placeholder="Contexto del regalo…" style={{width:"100%"}}/></div>
              </div>
              {rErr&&<div style={{color:RD,fontSize:12,marginBottom:8}}>{rErr}</div>}
              <Btn v="secondary" onClick={subReg}>Guardar regalo</Btn>
            </div>
          )}
          {misRegalos.length===0
            ?<p style={{fontSize:13,color:MU,textAlign:"center",padding:"20px 0"}}>Sin regalos para este título.</p>
            :misRegalos.map((r,i)=>(
              <div key={r.id} style={{border:"1px solid #E5E7EB",borderRadius:8,padding:"12px 14px",marginBottom:10,background:i%2===0?"#FAFAFA":W}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{flex:1}}><div style={{fontWeight:600,color:N,fontSize:13}}>{r.stakeholder}</div><div style={{fontSize:11,color:MU,marginTop:2}}>{fD(r.fecha)}{r.nota?` · ${r.nota}`:""}</div></div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontWeight:700,fontSize:17,color:G,fontFamily:"Libre Baskerville,serif"}}>{r.cantidad}</span>
                    <span style={{fontSize:11,color:MU}}>ej.</span>
                    <Btn sm v="danger" onClick={()=>{if(window.confirm("¿Eliminar?"))onSaveRegalos(regalos.filter(x=>x.id!==r.id));}}>✕</Btn>
                  </div>
                </div>
              </div>
            ))
          }
          {misRegalos.length>0&&<div style={{marginTop:6,padding:"7px 12px",background:G2,borderRadius:6,fontSize:12,color:N,textAlign:"right"}}>Total donado: <strong>{misRegalos.reduce((s,r)=>s+r.cantidad,0)} ejemplares</strong></div>}
        </div>
      </div>
    </div>
  );
}

/* ── CATÁLOGO ────────────────────────────────────────────────── */
function Catalogo({libros,regalos,consignaciones,onSaveLibros,onSaveRegalos,onSaveConsignaciones}){
  const[q,setQ]=useState(""), [cat,setCat]=useState(""), [selId,setSelId]=useState(null);
  const[addOpen,setAddOpen]=useState(false);
  const[toast,setToast]=useState("");
  const cats=[...new Set(libros.map(l=>l.cat))].sort();

  const filtered=useMemo(()=>libros.filter(l=>{
    const qL=q.toLowerCase();
    return(!q||l.titulo.toLowerCase().includes(qL)||l.autor.toLowerCase().includes(qL)||(l.isbn||"").includes(qL))&&(!cat||l.cat===cat);
  }),[q,cat,libros]);

  function handleAdd(f){
    const nuevo=formToLibro(f,uid());
    onSaveLibros([...libros,nuevo]);
    setAddOpen(false);

      </div>
    </div>
  </div>;
}

/* ── DASHBOARD ───────────────────────────────────────────────── */
function Dashboard({libros,regalos,consignaciones}){
  const gs=id=>calcStock(id,regalos,consignaciones,libros);
  const totDisp =useMemo(()=>libros.reduce((s,l)=>s+Math.max(0,gs(l.id).disp),0),[libros,regalos,consignaciones]);
  const totReg  =useMemo(()=>regalos.reduce((s,r)=>s+r.cantidad,0),[regalos]);
  const totCon  =useMemo(()=>libros.reduce((s,l)=>s+Math.max(0,gs(l.id).enConsig),0),[libros,consignaciones]);
  const alertas =useMemo(()=>libros.filter(l=>{const d=gs(l.id).disp;return d>=0&&d<20;}),[libros,regalos,consignaciones]);
  const agotados=useMemo(()=>libros.filter(l=>gs(l.id).disp<=0),[libros,regalos,consignaciones]);
  const cats=useMemo(()=>{const m={};libros.forEach(l=>{if(!m[l.cat])m[l.cat]={t:0,d:0};m[l.cat].t++;m[l.cat].d+=Math.max(0,gs(l.id).disp);});return Object.entries(m).sort((a,b)=>b[1].d-a[1].d);},[libros,regalos,consignaciones]);
  const lastR=[...regalos].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,5);
  const lastC=[...consignaciones].sort((a,b)=>b.fechaEnv.localeCompare(a.fechaEnv)).slice(0,5);
  const ROW={padding:"7px 0",borderBottom:"1px solid #F3F4F6",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"};
  const P=({t,ch})=><div style={{background:W,borderRadius:8,boxShadow:"0 1px 6px rgba(0,0,0,.07)",overflow:"hidden"}}><div style={{background:N,padding:"11px 18px"}}><span style={{color:W,fontWeight:600,fontSize:14}}>{t}</span></div><div style={{padding:18}}>{ch}</div></div>;
  return<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:14,marginBottom:22}}>
      <KPI label="Títulos en catálogo" value={libros.length} accent={N}/>
      <KPI label="Ejemplares disponibles" value={totDisp.toLocaleString("es-CL")} accent={N}/>
      <KPI label="Regalados / Donados" value={totReg.toLocaleString("es-CL")} accent={G}/>
      <KPI label="En consignación" value={totCon.toLocaleString("es-CL")} accent="#2563EB"/>
      <KPI label="Alertas stock bajo" value={alertas.length} accent="#D97706"/>
      <KPI label="Títulos agotados" value={agotados.length} accent={RD}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
      <P t="⚠ Stock bajo (< 20 ejemplares)" ch={alertas.length===0?<p style={{fontSize:13,color:MU}}>Sin alertas.</p>:alertas.map(l=>{const d=gs(l.id).disp;return<div key={l.id} style={ROW}><span style={{color:N,maxWidth:"80%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.titulo}</span><span style={{color:d<=0?RD:"#D97706",fontWeight:700}}>{d}</span></div>;})}/>
      <P t="📊 Resumen por categoría" ch={cats.map(([c,d])=><div key={c} style={ROW}><span style={{color:N}}>{c}</span><span style={{color:MU,fontSize:12}}>{d.t} tít. · <strong style={{color:N}}>{d.d.toLocaleString("es-CL")}</strong> ejs.</span></div>)}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <P t="🎁 Últimos regalos" ch={lastR.length===0?<p style={{fontSize:13,color:MU}}>Sin regalos.</p>:lastR.map(r=>{const l=libros.find(x=>x.id===r.libroId);return<div key={r.id} style={{padding:"7px 0",borderBottom:"1px solid #F3F4F6",fontSize:13}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:N,fontWeight:600}}>{r.stakeholder}</span><span style={{color:G,fontWeight:700}}>{r.cantidad} ejs. · {fD(r.fecha)}</span></div><div style={{color:MU,fontSize:12}}>{trunc(l?.titulo,55)}</div></div>;})}/>
      <P t="📦 Últimas consignaciones" ch={lastC.length===0?<p style={{fontSize:13,color:MU}}>Sin consignaciones.</p>:lastC.map(c=>{const l=libros.find(x=>x.id===c.libroId);const n=c.cantEnv-(c.cantVend||0)-(c.cantDev||0);return<div key={c.id} style={{padding:"7px 0",borderBottom:"1px solid #F3F4F6",fontSize:13}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:N,fontWeight:600}}>{c.distribuidor}</span><span style={{color:"#2563EB",fontWeight:700}}>{n} en consig.</span></div><div style={{color:MU,fontSize:12}}>{trunc(l?.titulo,55)}</div></div>;})}/>
    </div>
  </div>;
}

/* ── REGALOS GLOBAL ─────────────────────────────────────────── */
function Regalos({libros,regalos,onSave,consignaciones}){

  const[form,setForm]=useState({libroId:"",cantidad:"",fecha:new Date().toISOString().slice(0,10),stakeholder:"",nota:""});

  function submit(){if(!form.libroId||!form.cantidad||!form.fecha||!form.stakeholder.trim()){setErr("Completa todos los campos.");return;}const c=parseInt(form.cantidad);if(!c||c<=0){setErr("Cantidad inválida.");return;}if(stats&&c>stats.disp){setErr(`Disponible: ${stats.disp} ej.`);return;}onSave([...regalos,{id:uid(),libroId:form.libroId,cantidad:c,fecha:form.fecha,stakeholder:form.stakeholder.trim(),nota:form.nota}]);setToast("Registrado.");setForm({libroId:"",cantidad:"",fecha:new Date().toISOString().slice(0,10),stakeholder:"",nota:""});setOpen(false);setErr("");}
  const vis=regalos.filter(r=>{if(!filtro)return true;const q=filtro.toLowerCase();return r.stakeholder.toLowerCase().includes(q)||(libros.find(l=>l.id===r.libroId)?.titulo||"").toLowerCase().includes(q);}).sort((a,b)=>b.fecha.localeCompare(a.fecha));

      <Btn onClick={()=>setOpen(o=>!o)}>{open?"Cancelar":"+ Registrar regalo"}</Btn>
    </div>
    {open&&<div style={{background:W,borderRadius:8,padding:22,marginBottom:18,boxShadow:"0 1px 6px rgba(0,0,0,.07)",borderTop:`3px solid ${G}`}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div style={{gridColumn:"1/-1"}}><LBL ch="Título *"/><Sel value={form.libroId} onChange={v=>setForm({...form,libroId:v})} options={libroOpts} placeholder="Selecciona un libro…" style={{width:"100%"}}/>{stats&&<div style={{marginTop:5,fontSize:12,color:MU}}>Disponible: <strong style={{color:stats.disp<20?"#D97706":GR}}>{stats.disp} ej.</strong></div>}</div>
        <div><LBL ch="Cantidad *"/><Inp type="number" value={form.cantidad} onChange={v=>setForm({...form,cantidad:v})} min="1" style={{width:"100%"}}/></div>
        <div><LBL ch="Fecha *"/><Inp type="date" value={form.fecha} onChange={v=>setForm({...form,fecha:v})} style={{width:"100%"}}/></div>
        <div style={{gridColumn:"1/-1"}}><LBL ch="Stakeholder *"/><Inp value={form.stakeholder} onChange={v=>setForm({...form,stakeholder:v})} placeholder="Ej: Ministerio de Educación…" style={{width:"100%"}}/></div>
        <div style={{gridColumn:"1/-1"}}><LBL ch="Nota (opcional)"/><Inp value={form.nota} onChange={v=>setForm({...form,nota:v})} placeholder="Contexto…" style={{width:"100%"}}/></div>
      </div>
      {err&&<div style={{color:RD,fontSize:12,marginTop:10}}>{err}</div>}
      <div style={{marginTop:14,display:"flex",gap:10}}><Btn onClick={submit}>Guardar</Btn><Btn v="ghost" onClick={()=>{setOpen(false);setErr("");}}>Cancelar</Btn></div>
    </div>}
    <div style={{marginBottom:14}}><Inp value={filtro} onChange={setFiltro} placeholder="Filtrar por stakeholder o título…" style={{width:360}}/></div>
    {vis.length===0?<div style={{background:W,borderRadius:8,padding:48,textAlign:"center",color:MU,fontSize:13}}>{regalos.length===0?"Sin regalos registrados.":"Sin resultados."}</div>
    :<div style={{background:W,borderRadius:8,boxShadow:"0 1px 6px rgba(0,0,0,.07)",overflow:"hidden"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
      <thead><tr style={{background:N,color:W}}>{["Fecha","Título","Cant.","Stakeholder","Nota",""].map(h=><th key={h} style={{padding:"9px 12px",textAlign:h==="Cant."?"center":"left",fontWeight:600}}>{h}</th>)}</tr></thead>
      <tbody>{vis.map((r,i)=>{const l=libros.find(x=>x.id===r.libroId);return<tr key={r.id} style={{background:i%2===0?W:"#F9FAFB"}}>
        <td style={{padding:"8px 12px",color:MU,whiteSpace:"nowrap"}}>{fD(r.fecha)}</td>
        <td style={{padding:"8px 12px",color:N,fontWeight:500,maxWidth:240}}><div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{trunc(l?.titulo,52)}</div></td>
        <td style={{padding:"8px 12px",textAlign:"center",fontWeight:700,color:G}}>{r.cantidad}</td>

      </tr>;})}
      </tbody>
    </table></div>}
  </div>;

        <td style={{padding:"8px 12px",textAlign:"center"}}>{isE?<Inp type="number" value={ef.cantVend} onChange={v=>setEf({...ef,cantVend:v})} style={{width:55,padding:"3px 7px"}} min="0"/>:<span style={{color:(c.cantVend||0)>0?GR:MU,fontWeight:(c.cantVend||0)>0?700:400}}>{c.cantVend||"—"}</span>}</td>
        <td style={{padding:"8px 12px",textAlign:"center"}}>{isE?<Inp type="number" value={ef.cantDev} onChange={v=>setEf({...ef,cantDev:v})} style={{width:55,padding:"3px 7px"}} min="0"/>:<span style={{color:(c.cantDev||0)>0?OR:MU,fontWeight:(c.cantDev||0)>0?700:400}}>{c.cantDev||"—"}</span>}</td>
        <td style={{padding:"8px 12px",textAlign:"center",fontWeight:700,color:"#2563EB"}}>{n}</td>
        <td style={{padding:"8px 12px"}}>{isE?<Sel value={ef.estado} onChange={v=>setEf({...ef,estado:v})} options={[{v:"activa",l:"Activa"},{v:"liquidada",l:"Liquidada"},{v:"devuelta",l:"Devuelta"}]} style={{fontSize:12,padding:"3px 8px"}}/>:<Badge text={c.estado.charAt(0).toUpperCase()+c.estado.slice(1)} color={ec.cl} bg={ec.bg}/>}</td>
        <td style={{padding:"8px 12px"}}>{isE?<div style={{display:"flex",gap:5}}><Btn sm onClick={()=>saveE(c.id)}>✓</Btn><Btn sm v="ghost" onClick={()=>setEditId(null)}>✕</Btn></div>:<div style={{display:"flex",gap:5}}><Btn sm v="secondary" onClick={()=>{setEditId(c.id);setEf({cantVend:c.cantVend||0,cantDev:c.cantDev||0,estado:c.estado});}}>Actualizar</Btn><Btn sm v="danger" onClick={()=>{if(window.confirm("¿Eliminar?"))onSave(consignaciones.filter(x=>x.id!==c.id));}}>✕</Btn></div>}</td>
      </tr>;})}
      </tbody>
    </table></div></div>}
  </div>;
}

/* ── APP ─────────────────────────────────────────────────────── */
function App(){
  const[libros,setLibros]=useState(()=>{const s=stGet("uss_libros");if(s)return s;stSet("uss_libros",SEED);return SEED;});
  const[regalos,setRegalos]=useState(()=>stGet("uss_regalos")||[]);
  const[consignaciones,setConsignaciones]=useState(()=>stGet("uss_consignaciones")||[]);
  const[tab,setTab]=useState("dashboard");

  const saveLibros=useCallback(d=>{setLibros(d);stSet("uss_libros",d);},[]);
  const saveRegalos=useCallback(d=>{setRegalos(d);stSet("uss_regalos",d);},[]);
  const saveCons=useCallback(d=>{setConsignaciones(d);stSet("uss_consignaciones",d);},[]);

  const TABS=[["dashboard","📊 Dashboard"],["catalogo","📚 Catálogo"],["regalos","🎁 Regalos"],["consignaciones","📦 Consignaciones"]];
  return<div style={{minHeight:"100vh",background:CR}}>
    <div style={{background:N,padding:"14px 28px",display:"flex",alignItems:"center",gap:16}}>
      <div style={{width:3,height:36,background:G,borderRadius:2}}/>
      <div>
        <div style={{color:G,fontSize:10,fontWeight:600,letterSpacing:"2px",textTransform:"uppercase"}}>Universidad San Sebastián</div>
        <div style={{color:W,fontSize:18,fontWeight:700,fontFamily:"Libre Baskerville,serif",lineHeight:1.2}}>Inventario Ediciones USS</div>
      </div>
      <div style={{marginLeft:"auto",fontSize:11,color:"rgba(255,255,255,.4)"}}>{libros.length} títulos en catálogo</div>
    </div>
    <div style={{background:W,borderBottom:`2px solid ${G}`,display:"flex",padding:"0 28px",overflowX:"auto"}}>
      {TABS.map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{padding:"11px 18px",border:"none",background:"none",cursor:"pointer",whiteSpace:"nowrap",fontWeight:tab===k?700:400,color:tab===k?N:MU,borderBottom:`3px solid ${tab===k?G:"transparent"}`,fontSize:13,fontFamily:"DM Sans,sans-serif"}}>{l}</button>)}
    </div>
    <div style={{padding:"22px 28px",maxWidth:1500,margin:"0 auto"}}>
      {tab==="dashboard"      &&<Dashboard libros={libros} regalos={regalos} consignaciones={consignaciones}/>}
      {tab==="catalogo"       &&<Catalogo libros={libros} regalos={regalos} consignaciones={consignaciones} onSaveLibros={saveLibros} onSaveRegalos={saveRegalos} onSaveConsignaciones={saveCons}/>}
      {tab==="regalos"        &&<Regalos libros={libros} regalos={regalos} onSave={saveRegalos} consignaciones={consignaciones}/>}
      {tab==="consignaciones" &&<Consignaciones libros={libros} consignaciones={consignaciones} onSave={saveCons} regalos={regalos}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
